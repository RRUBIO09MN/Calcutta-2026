body { background: var(--bg); color: var(--text); font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; min-height: 100vh; }
.page { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

.title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.01em; }

.score-upcoming { font-size: 10px; color: #aaa; padding: 8px 0 4px; }
.score-owner { font-size: 9px; color: #666; margin-top: 2px; }

.body { padding: 12px 10px 0; }

.lbs-sub { font-size: 10px; color: var(--text3); }
.lbs-rows { padding: 2px 0; }
.lbr { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
.lbr-rank { font-size: 12px; font-weight: 700; min-width: 16px; text-align: center; }

.lbr-val { font-size: 12px; font-weight: 600; min-width: 56px; text-align: right; }
.lbr-val.pos{color:var(--green)}.lbr-val.neg{color:var(--red)}.lbr-val.neu{color:var(--text2)}

  'Duke Blue Devils':'Duke',"St. John's Red Storm":"St. John's",
  'Kansas Jayhawks':'Kansas','Michigan State Spartans':'Michigan St.',
  'UCLA Bruins':'UCLA','Connecticut Huskies':'UConn','UConn Huskies':'UConn',
  'Florida Gators':'Florida','Iowa Hawkeyes':'Iowa',
  'Nebraska Cornhuskers':'Nebraska','Illinois Fighting Illini':'Illinois',
  'Houston Cougars':'Houston','Arkansas Razorbacks':'Arkansas',
  'Michigan Wolverines':'Michigan','Purdue Boilermakers':'Purdue',

  'Iowa State Cyclones':'Iowa St.','Arizona Wildcats':'Arizona',

};

// Short names for scoreboard display
const SHORT = {
  'Duke Blue Devils':'Duke',"St. John's Red Storm":"St. John's",
  'Kansas Jayhawks':'Kansas','Michigan State Spartans':'MSU',
  'UCLA Bruins':'UCLA','Connecticut Huskies':'UConn','UConn Huskies':'UConn',
  'Florida Gators':'Florida','Iowa Hawkeyes':'Iowa',
  'Nebraska Cornhuskers':'Nebraska','Illinois Fighting Illini':'Illinois',
  'Houston Cougars':'Houston','Arkansas Razorbacks':'Arkansas',
  'Michigan Wolverines':'Michigan','Purdue Boilermakers':'Purdue',
  'Texas Tech Red Raiders':'Tex Tech','Alabama Crimson Tide':'Alabama',
  'Tennessee Volunteers':'Tennessee','Virginia Cavaliers':'Virginia',
  'Iowa State Cyclones':'Iowa St.','Arizona Wildcats':'Arizona',
  'Utah State Aggies':'Utah St.','Kentucky Wildcats':'Kentucky',
  'Kansas Jayhawks':'Kansas',
};

function espnRoundToKey(h) {
  if (!h) return null;
  const r = h.toLowerCase();
  if (r.includes('first four') || r.includes('first round')) return 'r64';
  if (r.includes('2nd round') || r.includes('second round')) return 'r32';
  if (r.includes('sweet 16') || r.includes('regional semifinal')) return 's16';
  if (r.includes('elite eight') || r.includes('regional final')) return 'e8';
  if (r.includes('final four') || r.includes('national semifinal')) return 'f4';
  if (r.includes('national championship')) return 'champ';
  return null;
}

let liveScores = {}; // keyed by game title from SUN_GAMES

async function fetchLiveScores() {
  try {
    const resp = await fetch(WORKER_URL, {cache:'no-store'});
    if (!resp.ok) return;
    const data = await resp.json();
    const events = data.events || [];

    for (const event of events) {
      const comp = event.competitions?.[0];
      if (!comp) continue;
      const headline = comp.notes?.[0]?.headline || '';
      const roundKey = espnRoundToKey(headline);
      if (!roundKey) continue;

      const statusType = comp.status?.type?.name;
      const isLive = statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_HALFTIME';
      const isFinal = statusType === 'STATUS_FINAL';
      if (!isLive && !isFinal) continue;

      const competitors = comp.competitors || [];
      if (competitors.length !== 2) continue;
      const c0 = competitors[0], c1 = competitors[1];
      const d0 = c0.team?.displayName || '', d1 = c1.team?.displayName || '';
      const s0 = parseInt(c0.score)||0, s1 = parseInt(c1.score)||0;
      const n0 = SHORT[d0] || d0.split(' ').pop();
      const n1 = SHORT[d1] || d1.split(' ').pop();
      const clock = comp.status?.displayClock || '';
      const half = comp.status?.period || 1;
      const clockStr = isFinal ? 'Final' :
        statusType==='STATUS_HALFTIME' ? 'Half' :
        `${half>1?'2nd':'1st'} · ${clock}`;

      // Match to SUN_GAMES
      const match = SUN_GAMES.find(g => {
        if (g.done) return false;
        const gt = g.t.toLowerCase();
        return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
               (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
      });

      if (match) {
        liveScores[match.t] = {a:n0,as:s0,b:n1,bs:s1,status:isFinal?'final':'live',clock:clockStr};
      }

      // Update RESULTS for completed games
      if (isFinal) {
        for (const c of competitors) {
          const ourName = ESPN_MAP[c.team?.displayName];
          if (!ourName || !RESULTS[ourName]) continue;
          const r = RESULTS[ourName];
          const valid = (roundKey==='r64') || (roundKey==='r32'&&r.r64) ||
            (roundKey==='s16'&&r.r32) || (roundKey==='e8'&&r.s16) ||
            (roundKey==='f4'&&r.e8) || (roundKey==='champ'&&r.f4);
          if (!valid) continue;
          if (c.winner===true) { RESULTS[ourName][roundKey]=1; RESULTS[ourName].alive=1; }
          else if (c.winner===false) { if(!RESULTS[ourName][roundKey]) RESULTS[ourName][roundKey]=0; RESULTS[ourName].alive=0; }
        }
      }
    }

    const liveCount = Object.values(liveScores).filter(s=>s.status==='live').length;
    const el = document.getElementById('status-text');
    if (el) el.textContent = `✓ ESPN live · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${liveCount?` · 🔴 ${liveCount} game${liveCount>1?'s':''} live`:''}`;
    renderScoreboard();
    render();

    // 2 min if live, 5 min otherwise
    setTimeout(fetchLiveScores, liveCount > 0 ? 2*60*1000 : 5*60*1000);
  } catch(e) {
    console.warn('Worker fetch failed:', e.message, e);
    const el = document.getElementById('status-text');
    if(el) el.textContent = 'ESPN fetch failed: ' + e.message + ' — retrying in 5 min';
    setTimeout(fetchLiveScores, 5*60*1000);
  }
}


function pts(team){const r=RESULTS[team]||{};return(r.r64||0)*1+(r.r32||0)*2+(r.s16||0)*4+(r.e8||0)*8+(r.f4||0)*16+(r.champ||0)*24;}
function isAlive(t){return!!(RESULTS[t]||{}).alive;}
function rlabel(t){const r=RESULTS[t]||{};if(r.champ)return'Champ 🏆';if(r.f4)return'Final 4';if(r.e8)return'Elite 8';if(r.s16)return'Sweet 16';if(r.r32)return'R32 ✓';if(r.r64)return'R64 ✓';return'';}

function buildLB(){
  return['Jack','Lee','Sanjay','nathan'].map(name=>{
    const my=TEAMS.filter(x=>x.o===name);
    const spend=my.reduce((s,x)=>s+x.c,0);
    const shares=my.reduce((s,x)=>s+pts(x.t),0);
    const aliveCount=my.filter(x=>isAlive(x.t)).length;
    const earnedBack=(shares/TOTAL_SHARES)*TOTAL_SPEND;
    const profit=earnedBack-spend;
    const roi=(profit/spend)*100;
    return{name,spend,shares,aliveCount,earnedBack,profit,roi,total:my.length,
      scoringAlive:my.filter(x=>pts(x.t)>0&&isAlive(x.t)).sort((a,b)=>b.c-a.c),
      scoringElim: my.filter(x=>pts(x.t)>0&&!isAlive(x.t)).sort((a,b)=>b.c-a.c),
      stillAlive:  my.filter(x=>isAlive(x.t)&&pts(x.t)===0).sort((a,b)=>b.c-a.c),
      elim:        my.filter(x=>!isAlive(x.t)&&pts(x.t)===0).sort((a,b)=>b.c-a.c)
    };
  }).sort((a,b)=>b.shares-a.shares);
}

function renderScoreboard(){
  let h='';
  // Sort: live first, then upcoming, then finals
  const sorted=[...SUN_GAMES].sort((a,b)=>{
    const la=liveScores[a.t],lb=liveScores[b.t];
    const aL=la&&la.status==='live', bL=lb&&lb.status==='live';
    const aF=a.done||(la&&la.status==='final'), bF=b.done||(lb&&lb.status==='final');
    if(aL&&!bL)return -1; if(bL&&!aL)return 1;
    if(!aF&&bF)return -1; if(aF&&!bF)return 1;
    return 0;
  });
  sorted.forEach(g=>{
    const live=liveScores[g.t];
    if(live&&live.status==='live'){
      h+=`<div class="score-item"><div class="score-label" style="color:#ff4444">🔴 ${live.clock}</div><div class="score-teams"><div class="score-row"><span class="score-team">${live.a}</span><span class="score-pts">${live.as}</span></div><div class="score-row"><span class="score-team">${live.b}</span><span class="score-pts">${live.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else if(g.done){
      const aWin=g.as>g.bs;
      h+=`<div class="score-item"><div class="score-label">Final · R32</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${g.a}</span><span class="score-pts${aWin?' winner':''}">${g.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${g.b}</span><span class="score-pts${!aWin?' winner':''}">${g.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else if(live&&live.status==='final'){
      const aWin=live.as>live.bs;
      h+=`<div class="score-item"><div class="score-label">Final · R32</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${live.a}</span><span class="score-pts${aWin?' winner':''}">${live.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${live.b}</span><span class="score-pts${!aWin?' winner':''}">${live.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else {
      h+=`<div class="score-item"><div class="score-label">${g.time}</div><div class="score-upcoming">${g.t}</div><div class="score-owner">${g.owners}</div></div>`;
    }
  });
  SAT_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="score-item"><div class="score-label">Final · R32</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${g.a}</span><span class="score-pts${aWin?' winner':''}">${g.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${g.b}</span><span class="score-pts${!aWin?' winner':''}">${g.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
  });
  const el=document.getElementById('scoreboard-strip');
  if(el)el.innerHTML=h;
}

  const aliveTotal=lb.reduce((s,p)=>s+p.aliveCount,0);
  const maxSpend=Math.max(...lb.map(p=>p.spend));
  const maxRoi=Math.max(...lb.map(p=>Math.abs(p.roi)),1);
  const lbRoi=[...lb].sort((a,b)=>b.roi-a.roi);

  const stEl=document.getElementById('status-text');
  if(stEl) stEl.textContent='Sun Mar 22 · R32 in progress · last baked update';

  let h='';

  h+=`<div class="slabel">Standings</div><div class="lb-strips">`;
  const lbS=[...lb].sort((a,b)=>b.shares-a.shares);

  lbS.forEach((p,i)=>{
    const c=PC[p.name];const pct=(p.shares/maxShares*100).toFixed(1);const init=p.name.slice(0,2).toUpperCase();

  h+=`</div></div>`;
  h+=`<div class="lbs"><div class="lbs-head"><span class="lbs-name">💰 ROI leaderboard</span><span class="lbs-sub">vs auction spend</span></div><div class="lbs-rows">`;
  lbRoi.forEach((p,i)=>{
    const c=PC[p.name];const pct=(Math.abs(p.roi)/maxRoi*100).toFixed(1);const barColor=p.roi>=0?'#007a47':'#cc2200';const vcls=p.roi>2?'pos':p.roi<-2?'neg':'neu';const roiStr=(p.roi>=0?'+':'')+p.roi.toFixed(0)+'%';const init=p.name.slice(0,2).toUpperCase();

  });
  h+=`</div></div></div>`;

  h+=`<div class="metrics">
    <div class="metric"><div class="metric-lbl">Pool</div><div class="metric-val">$${fmt(TOTAL_SPEND)}</div><div class="metric-sub">total auction spend</div></div>
    <div class="metric"><div class="metric-lbl">Leader</div><div class="metric-val">${lb[0].name.charAt(0).toUpperCase()+lb[0].name.slice(1)}</div><div class="metric-sub">${lb[0].shares} pts · ${((lb[0].shares/TOTAL_SHARES)*100).toFixed(0)}% of pool</div></div>
    <div class="metric"><div class="metric-lbl">Shares earned</div><div class="metric-val">${fmtInt(totalShares)}</div><div class="metric-sub">of 187 possible</div></div>
    <div class="metric"><div class="metric-lbl">Teams alive</div><div class="metric-val">${fmtInt(aliveTotal)}</div><div class="metric-sub">still in tournament</div></div>
  </div>`;

  h+=`<div class="slabel">Players</div><div class="cards">`;
  lb.forEach((p,i)=>{
    const c=PC[p.name];
    const sharePct=(p.shares/maxShares*100).toFixed(1);
    const roiStr=(p.roi>=0?'+':'')+p.roi.toFixed(0)+'%';
    const roiCls=p.roi>2?'chip-pos':p.roi<-2?'chip-neg':'chip-neu';
    const init=p.name.slice(0,2).toUpperCase();
    const isOpen=expanded[p.name];
    const disp=p.name.charAt(0).toUpperCase()+p.name.slice(1);
    const spendPct=(p.spend/maxSpend*100).toFixed(1);
    const earnedPct=Math.min((p.earnedBack/maxSpend*100),100).toFixed(1);
    const pnlCls=p.profit>0?'pnl-pos':p.profit<0?'pnl-neg':'pnl-neu';
    const pnlStr=(p.profit>=0?'+$':'-$')+fmt(Math.abs(p.profit));
    h+=`<div class="card"><div class="card-hdr" onclick="tog('${p.name}')">
      <div class="card-toprow">
        <div class="av" style="background:${c.av};color:${c.avtxt}">${init}</div>
        <div class="cinfo"><div class="cname">${disp}</div><div class="csub">${p.total} teams · $${fmt(p.spend)} spent · ${p.aliveCount} alive</div></div>
        <div class="cright"><div class="pts-big" style="color:${c.c}">${p.shares}</div><div class="pts-lbl">shares</div><div class="roi-chip ${roiCls}">${roiStr}</div></div>
      </div>
      <div class="fin">
        <div class="fin-row"><div class="fin-lbl">Spent</div><div class="fin-track"><div class="fin-fill" style="width:${spendPct}%;background:#ccc"></div></div><div class="fin-val">$${fmt(p.spend)}</div></div>
        <div class="fin-row"><div class="fin-lbl">Earned</div><div class="fin-track"><div class="fin-fill" style="width:${earnedPct}%;background:${c.c}"></div></div><div class="fin-val" style="color:${c.c}">$${fmt(p.earnedBack)}</div></div>
        <div class="pnl-row"><div class="pnl-lbl">Current P&L</div><div class="pnl-val ${pnlCls}">${pnlStr}</div></div>
      </div>
      <div class="sbar"><div class="sbar-fill" style="width:${sharePct}%;background:${c.c}"></div></div>
      <div class="tog-hint">${isOpen?'▲ hide teams':'▼ show teams'}</div>
    </div>
    <div class="card-detail ${isOpen?'open':''}">`;
    if(p.scoringAlive.length){
      h+=`<div class="dsec"><div class="dsec-title">Scoring · still alive <span>${p.scoringAlive.length}</span></div><div class="tlist">`;
      p.scoringAlive.forEach(x=>{const s=pts(x.t),rl=rlabel(x.t);h+=`<div class="trow sc"><span class="tn">${x.t}${rl?`<span class="rpill">${rl}</span>`:''}</span><span class="tv">+${s} pts · $${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.stillAlive.length){
      h+=`<div class="dsec"><div class="dsec-title">Still alive — no wins yet <span>${p.stillAlive.length}</span></div><div class="tlist">`;
      p.stillAlive.forEach(x=>{h+=`<div class="trow al"><span class="tn">${x.t}</span><span class="tv">$${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.scoringElim.length){
      h+=`<div class="dsec"><div class="dsec-title">Eliminated · had points <span>${p.scoringElim.length}</span></div><div class="tlist">`;
      p.scoringElim.forEach(x=>{const s=pts(x.t),rl=rlabel(x.t);h+=`<div class="trow sc el"><span class="tn">${x.t}${rl?`<span class="rpill">${rl}</span>`:''}</span><span class="tv">+${s} pts · $${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.elim.length){
      h+=`<div class="dsec"><div class="dsec-title">Eliminated <span>${p.elim.length}</span></div><div class="tlist">`;
      p.elim.forEach(x=>{h+=`<div class="trow el"><span class="tn">${x.t}</span><span class="tv">$${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    h+=`</div></div>`;
  });
  h+=`</div>`;

  const texasAlive=!!(RESULTS['NC State/Texas']||{}).alive;
  h+=`<div class="slabel">Bonus Awards</div><div class="sblock">
    <div class="sblock-head">1 share each · awarded at tournament end</div>
    <div class="brow"><div class="bicon">💥</div><div><div class="btitle">Biggest blowout victim</div><div class="bdesc">Current leader: Lehigh/Prairie View lost to Florida by 59 pts — 2nd largest margin in NCAA history.</div><div class="bwin w-like">⟳ Currently Sanjay · not yet confirmed</div></div></div>
    <div class="brow"><div class="bicon">🏆</div><div><div class="btitle">Biggest upset</div><div class="bdesc">Current leader: Texas (#11) over Gonzaga (#3) — 8-seed differential.</div><div class="bwin w-like">⟳ Currently Jack (owns NC State/Texas) · not yet confirmed</div></div></div>
    <div class="brow"><div class="bicon">🌀</div><div><div class="btitle">Lowest seed in Final Four</div><div class="bdesc">Texas (11-seed) is the only double-digit seed still alive.</div><div class="bwin ${texasAlive?'w-like':'w-tbd'}">${texasAlive?'⟳ Watch Texas — Jack could win this if Texas reaches Final Four':'TBD'}</div></div></div>
  </div>`;

  h+=`<div class="slabel">Today's R32 Games · Sun Mar 22</div><div class="sblock">`;
  SUN_GAMES.forEach(g=>{
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div>`;
    if(g.done){const aWin=g.as>g.bs;h+=`<div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)} ✓</div>`;}

    h+=`</div>`;
  });
  h+=`</div>`;

  h+=`<div class="slabel">Saturday R32 Finals</div><div class="sblock">`;
  SAT_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="footer-note">Scoring: 1pt R64 · 2pt R32 · 4pt S16 · 8pt E8 · 16pt F4 · 24pt Championship · 1pt each bonus. P&L based on current shares projected to pool ($${fmt(TOTAL_SPEND)}). Split teams: winner of First Four gets full credit. Results are baked in — send scores to get updated file.</div>`;

  document.getElementById('root').innerHTML=h;
}

function tog(n){expanded[n]=!expanded[n];render();}

renderScoreboard();
render();
fetchLiveScores();
</script>
