:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f2f2f0;
  --surface3: #e8e8e5;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --jack: #0066cc;
  --lee: #007a47;
  --sanjay: #cc3300;
  --nathan: #7744cc;
  --green: #007a47;
  --red: #cc2200;
  --gold: #b8860b;
  --silver: #888;
  --bronze: #8b5a2b;
  --radius: 10px;
  --radius-sm: 7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; min-height: 100vh; }
.page { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

.header { background: #cc0000; padding: 12px 14px 10px; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.subtitle { font-size: 10px; color: rgba(255,255,255,.75); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #7aff7a; flex-shrink: 0; animation: pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.2} }
.hbtn { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: #fff; cursor: pointer; font-family: 'Outfit', sans-serif; white-space: nowrap; }
.hbtn:active { opacity: .7; }

.scoreboard { background: #111; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; padding: 0 4px; scrollbar-width: none; }
.scoreboard::-webkit-scrollbar { display: none; }
.score-item { display: inline-flex; flex-direction: column; padding: 6px 10px; border-right: 1px solid #333; vertical-align: top; min-width: 110px; }
.score-item:last-child { border-right: none; }
.score-label { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #888; margin-bottom: 3px; }
.score-teams { display: flex; flex-direction: column; gap: 2px; }
.score-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.score-team { font-size: 12px; font-weight: 500; color: #ccc; }
.score-team.winner { font-weight: 700; color: #fff; }
.score-pts { font-size: 12px; font-weight: 700; color: #ccc; min-width: 20px; text-align: right; }
.score-pts.winner { color: #7aff7a; }
.score-upcoming { font-size: 10px; color: #aaa; padding: 8px 0 4px; }
.score-owner { font-size: 9px; color: #666; margin-top: 2px; }

.body { padding: 12px 10px 0; }

.slabel { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; padding-left: 2px; display: flex; align-items: center; gap: 6px; }
.slabel::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.lb-strips { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.lbs { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.lbs-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.lbs-name { font-size: 11px; font-weight: 600; color: var(--text); }
.lbs-sub { font-size: 10px; color: var(--text3); }
.lbs-rows { padding: 2px 0; }
.lbr { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
.lbr-rank { font-size: 12px; font-weight: 700; min-width: 16px; text-align: center; }
.lbr-rank.r1{color:var(--gold)}.lbr-rank.r2{color:var(--silver)}.lbr-rank.r3{color:var(--bronze)}.lbr-rank.r4{color:var(--text3)}
.lbr-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.lbr-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.lbr-track { width: 75px; height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.lbr-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.lbr-val { font-size: 12px; font-weight: 600; min-width: 56px; text-align: right; }
.lbr-val.pos{color:var(--green)}.lbr-val.neg{color:var(--red)}.lbr-val.neu{color:var(--text2)}

.metrics { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 14px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.metric-lbl { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
.metric-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -.01em; }
.metric-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

.cards { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-hdr { padding: 12px 13px; cursor: pointer; user-select: none; }
.card-hdr:active { background: var(--surface2); }

.card-toprow { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
.av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.cinfo { flex: 1; min-width: 0; }
.cname { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
.csub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.cright { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.pts-big { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -.02em; }
.pts-lbl { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); }
.roi-chip { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.chip-pos{background:#e8f5ee;color:var(--green)}
.chip-neg{background:#fdecea;color:var(--red)}
.chip-neu{background:var(--surface2);color:var(--text2)}

.fin { margin-bottom: 10px; }
.fin-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.fin-lbl { font-size: 10px; font-weight: 600; color: var(--text3); min-width: 46px; letter-spacing: .02em; }
.fin-track { flex: 1; height: 7px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.fin-fill { height: 100%; border-radius: 4px; transition: width .65s cubic-bezier(.4,0,.2,1); }
.fin-val { font-size: 11px; font-weight: 600; min-width: 40px; text-align: right; color: var(--text2); }
.pnl-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: 6px; padding: 6px 10px; margin-top: 3px; }
.pnl-lbl { font-size: 11px; color: var(--text2); }

.sbar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.tog-hint { text-align: center; font-size: 10px; color: var(--text3); }

.tlist { display: flex; flex-direction: column; gap: 3px; }
.trow { display: flex; justify-content: space-between; align-items: center; padding: 5px 9px; border-radius: 6px; font-size: 12px; }

.trow.sc .tv{color:var(--green);font-weight:600}

.grow:first-of-type{border-top:none}
.gteams{font-size:13px;font-weight:500;color:var(--text)}
.gowners{font-size:10px;color:var(--text3);margin-top:1px}
.gscore{font-size:12px;font-weight:700;color:var(--green)}
.gtime{font-size:11px;color:var(--text3)}

.api-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.api-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.api-desc{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.api-row{display:flex;gap:6px}
.api-inp{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);outline:none;font-family:'Outfit',sans-serif}
.api-inp:focus{border-color:#0066cc}

.api-btn{background:#0066cc;color:#fff;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}

.err-banner{background:#fdecea;border:1px solid #f5b8b4;border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--red);line-height:1.4}

.footer-note{font-size:10px;color:var(--text3);line-height:1.6;padding:8px 4px 0}
.chgkey{display:block;text-align:center;padding:6px;font-size:10px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;width:100%}
</style>

function buildLB(){
  return['Jack','Lee','Sanjay','nathan'].map(name=>{
    const my=TEAMS.filter(x=>x.o===name);
    const spend=my.reduce((s,x)=>s+x.c,0);
    const shares=my.reduce((s,x)=>s+pts(x.t),0);
    const aliveCount=my.filter(x=>isAlive(x.t)).length;
    const earnedBack=(shares/TOTAL_SHARES)*TOTAL_SPEND;
    const profit=earnedBack-spend;
    const roi=(profit/spend)*100;
    return{name,spend,shares,aliveCount,earnedBack,profit,roi,
      total:my.length,
      scoringAlive:my.filter(x=>pts(x.t)>0 && isAlive(x.t)),
      scoringElim: my.filter(x=>pts(x.t)>0 && !isAlive(x.t)),
      stillAlive:  my.filter(x=>isAlive(x.t)&&pts(x.t)===0),
      elim:        my.filter(x=>!isAlive(x.t)&&pts(x.t)===0)
    };
  }).sort((a,b)=>b.shares-a.shares);
}

// Round name → our key
function espnRoundToKey(roundName) {
  if (!roundName) return null;
  const r = roundName.toLowerCase();
  if (r.includes('first four') || r.includes('first round') || r.includes('round of 64')) return 'r64';
  if (r.includes('second round') || r.includes('round of 32')) return 'r32';
  if (r.includes('sweet') || r.includes('regional semifinal')) return 's16';
  if (r.includes('elite') || r.includes('regional final')) return 'e8';
  if (r.includes('final four') || r.includes('national semifinal')) return 'f4';
  if (r.includes('national championship') || r.includes('championship')) return 'champ';
  return null;
}

async function fetchESPN() {
  const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=100&limit=50';
  // Add cache-busting timestamp so proxies don't serve stale data
  const bust = `&_=${Date.now()}`;
  const PROXIES = [
    `https://corsproxy.io/?${encodeURIComponent(ESPN_URL + bust)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(ESPN_URL + bust)}`,
    `https://thingproxy.freeboard.io/fetch/${ESPN_URL + bust}`,
    ESPN_URL + bust,
  ];
  for (const url of PROXIES) {
    try {
      const resp = await fetch(url, {cache: 'no-store'});
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data.events) return data.events;
    } catch(e) {
      continue;
    }
  }
  throw new Error('All ESPN sources failed');
}

async function fetchAndRender(){
  if(isLoading)return;
  isLoading=true; errorMsg=null;
  const btn=document.getElementById('refresh-btn');
  if(btn)btn.textContent='↻ …';
  const st=document.getElementById('status-text');
  if(st)st.textContent='Fetching live scores from ESPN…';

  let espnWorked = false;

  try{
    const events = await fetchESPN();
    let updatedCount = 0;

    for (const event of events) {
      const comp = event.competitions?.[0];
      if (!comp) continue;

      const roundName = event.name || comp.notes?.[0]?.headline || event.season?.slug || '';
      const roundKey = espnRoundToKey(roundName) ||
        espnRoundToKey(comp.notes?.[0]?.headline || '');

      const statusType = comp.status?.type?.name;
      const isComplete = statusType === 'STATUS_FINAL';
      const isLive = statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_HALFTIME';
      const clock = comp.status?.displayClock || '';
      const half = comp.status?.period || 1;

      const competitors = comp.competitors || [];
      if (competitors.length !== 2) continue;

      // Get scores for live display
      const c0 = competitors[0];
      const c1 = competitors[1];
      const name0 = GAME_SHORT[c0.team?.displayName] || c0.team?.shortDisplayName || c0.team?.abbreviation || '';
      const name1 = GAME_SHORT[c1.team?.displayName] || c1.team?.shortDisplayName || c1.team?.abbreviation || '';
      const score0 = parseInt(c0.score) || 0;
      const score1 = parseInt(c1.score) || 0;

      // Try to match to a SUN_GAMES entry
      const matchedGame = SUN_GAMES.find(g => {
        const gt = g.t.toLowerCase();
        return (gt.includes(name0.toLowerCase()) || gt.includes((c0.team?.displayName||'').toLowerCase())) &&
               (gt.includes(name1.toLowerCase()) || gt.includes((c1.team?.displayName||'').toLowerCase()));
      });

      if (matchedGame && (isLive || isComplete)) {
        const clockStr = isComplete ? 'Final' :
          (statusType === 'STATUS_HALFTIME' ? 'Half' :
          `${half > 1 ? '2nd' : '1st'} · ${clock}`);

        LIVE_SCORES[matchedGame.t] = {
          a: name0, as: score0,
          b: name1, bs: score1,
          status: isComplete ? 'final' : 'live',
          clock: clockStr
        };
      }

      // Update win/loss results for completed games
      if (isComplete && roundKey) {
        for (const competitor of competitors) {
          const espnName = competitor.team?.displayName;
          const ourName = ESPN_MAP[espnName];
          if (!ourName) continue;
          if (!RESULTS[ourName]) RESULTS[ourName] = {};
          if (competitor.winner === true) {
            RESULTS[ourName][roundKey] = 1;
            RESULTS[ourName].alive = 1;
            updatedCount++;
          } else if (competitor.winner === false) {
            if (!RESULTS[ourName][roundKey]) RESULTS[ourName][roundKey] = 0;
            RESULTS[ourName].alive = 0;
          }
        }
      }
    }

    espnWorked = true;
    lastUpdated = new Date();
    console.log(`ESPN: ${events.length} events, ${updatedCount} results updated, ${Object.keys(LIVE_SCORES).length} live scores`);

  } catch(e) {
    console.warn('ESPN fetch failed:', e.message);
  }

  isLoading=false;
  if(btn)btn.textContent='↻ Refresh';

  // Show ESPN status in subtitle
  const stEl=document.getElementById('status-text');
  if(stEl){
    if(espnWorked && lastUpdated){
      const liveCount = Object.values(LIVE_SCORES).filter(s=>s.status==='live').length;
      const interval = liveCount > 0 ? '2 min' : '15 min';
      stEl.textContent = `✓ ESPN live · updated ${lastUpdated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${liveCount>0?` · ${liveCount} game${liveCount>1?'s':''} in progress · refreshing every ${interval}`:''}`;
    } else {
      stEl.textContent = 'ESPN unavailable · showing latest known results';
    }
  }

  render();
  renderScoreboard();
  clearTimeout(refreshTimer);
  // Refresh every 2 min if any game is live, otherwise every 15 min
  const hasLive = Object.values(LIVE_SCORES).some(s => s.status === 'live');
  refreshTimer=setTimeout(fetchAndRender, hasLive ? 2*60*1000 : 15*60*1000);
}

    <div class="brow"><div class="bicon">🏆</div><div><div class="btitle">Biggest upset</div><div class="bdesc">Current leader: Texas (#11) over Gonzaga (#3) — 8-seed differential. A larger upset could still happen in remaining rounds.</div><div class="bwin w-like">⟳ Currently Jack (owns NC State/Texas) · not yet confirmed</div></div></div>
    <div class="brow"><div class="bicon">🌀</div><div><div class="btitle">Lowest seed in Final Four</div><div class="bdesc">Texas (11-seed) is the only double-digit seed still alive. All other remaining teams are seeds 1–4.</div><div class="bwin ${lowestSeedCls}">${lowestSeedNote}</div></div></div>
  </div>`;

  // Sunday games — TODAY, shown first — reflects live/final from ESPN
  h+=`<div class="slabel">Today's R32 Games · Sun Mar 22</div><div class="sblock">`;
  SUN_GAMES.forEach(g=>{
    const live = LIVE_SCORES[g.t];
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div>`;
    if(live){
      const aWin = live.status==='final' && live.as > live.bs;
      const bWin = live.status==='final' && live.bs > live.as;
      const label = live.status==='final'
        ? `<div class="gscore">${aWin?live.a:live.b} ${Math.max(live.as,live.bs)}–${Math.min(live.as,live.bs)} ✓</div>`
        : `<div class="gscore" style="color:#cc0000">🔴 ${live.a} ${live.as}–${live.bs} ${live.b} <span style="font-size:10px;font-weight:500">${live.clock}</span></div>`;
      h+=label;
    } else {
      h+=`<div class="gtime">${g.time}</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;

  // Saturday finals
  h+=`<div class="slabel">Saturday R32 Finals</div><div class="sblock">`;
  SAT_GAMES.forEach(g=>{
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div>`;
    if(g.done){const aWin=g.as>g.bs;h+=`<div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div>`;}
    else{h+=`<div class="gtime">${g.time}</div>`;}
    h+=`</div>`;
  });
  h+=`</div>`;

  if(lastUpdated)h+=`<div class="last-upd">ESPN last fetched ${lastUpdated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})} · Auto-refreshes every 15 min · No setup needed</div>`;

  h+=`<div class="footer-note">Scoring: 1pt R64 · 2pt R32 · 4pt S16 · 8pt E8 · 16pt F4 · 24pt Championship · 1pt each bonus. P&L and ROI based on current shares projected to pool total ($${fmt(TOTAL_SPEND)}). Split teams: winner of First Four gets full credit. Scores auto-update from ESPN every 15 min — no setup needed.</div>`;

  document.getElementById('root').innerHTML=h;
}

function tog(n){expanded[n]=!expanded[n];render();}

renderScoreboard();
render();
fetchAndRender();
</script>
</body>
</html>
