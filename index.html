<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Live Calcutta Results Tracker</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.15);
    --text: #1a1a18;
    --text2: #6b6960;
    --text3: #9a9890;
    --green-bg: #eaf3de;
    --green-fg: #3b6d11;
    --green-mid: #97c459;
    --blue-bg: #e6f1fb;
    --blue-fg: #185fa5;
    --red-bg: #fcebeb;
    --red-fg: #a32d2d;
    --amber-bg: #faeeda;
    --amber-fg: #854f0b;
    --gold: #9a7b00;
    --silver: #666;
    --bronze: #7a4b28;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1916;
      --surface: #242220;
      --surface2: #2e2c29;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0ede6;
      --text2: #9a9890;
      --text3: #6b6960;
      --green-bg: #1a2e0a;
      --green-fg: #7ec845;
      --green-mid: #3b6d11;
      --blue-bg: #0d2238;
      --blue-fg: #69aee8;
      --red-bg: #2e0e0e;
      --red-fg: #e87070;
      --amber-bg: #2a1c06;
      --amber-fg: #e8a84a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 0;
  }
  .page { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.02em; line-height: 1.2; }
  .subtitle { font-size: 11px; color: var(--text2); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; flex-shrink: 0; animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
  .refresh-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .refresh-btn:active { opacity: .7; }
  .refresh-btn.spinning { color: var(--text3); }

  /* Body padding */
  .body { padding: 12px 12px 0; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
  .metric-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; letter-spacing: -.02em; }
  .metric-sub { font-size: 10px; color: var(--text2); margin-top: 1px; }

  /* Player cards */
  .cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { padding: 12px 14px; cursor: pointer; user-select: none; }
  .card-header:active { background: var(--surface2); }
  .card-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rank { font-size: 14px; font-weight: 700; min-width: 18px; }
  .rank.gold { color: var(--gold); }
  .rank.silver { color: var(--silver); }
  .rank.bronze { color: var(--bronze); }
  .rank.fourth { color: var(--text3); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; letter-spacing: -.02em; }
  .player-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .player-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .pts-big { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -.02em; }
  .pts-lbl { font-size: 10px; color: var(--text3); text-align: right; margin-top: -2px; }
  .roi-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .roi-pos { background: var(--green-bg); color: var(--green-fg); }
  .roi-neg { background: var(--red-bg); color: var(--red-fg); }
  .roi-neu { background: var(--surface2); color: var(--text2); }
  .progress { height: 3px; background: var(--surface2); border-radius: 2px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
  .toggle-hint { text-align: center; font-size: 10px; color: var(--text3); margin-top: 5px; }

  /* Card detail */
  .card-detail { border-top: 0.5px solid var(--border); padding: 10px 14px; display: none; }
  .card-detail.open { display: block; }
  .detail-section { margin-bottom: 10px; }
  .detail-section:last-child { margin-bottom: 0; }
  .section-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; display: flex; justify-content: space-between; }
  .team-list { display: flex; flex-direction: column; gap: 3px; }
  .team-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 9px; border-radius: 7px; font-size: 12px; }
  .team-row.scoring { background: var(--green-bg); border: 0.5px solid var(--green-mid); }
  .team-row.alive { background: var(--surface2); border: 0.5px solid var(--border); }
  .team-row.elim { opacity: .38; background: var(--surface2); border: 0.5px solid var(--border); }
  .team-name { font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 4px; }
  .team-row.scoring .team-name { color: var(--green-fg); }
  .round-pill { font-size: 9px; background: var(--blue-bg); color: var(--blue-fg); padding: 1px 5px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
  .team-val { font-size: 11px; color: var(--text2); flex-shrink: 0; margin-left: 6px; }
  .team-row.scoring .team-val { color: var(--green-fg); font-weight: 600; }

  /* Bonus section */
  .section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
  .section-head { background: var(--surface2); padding: 9px 14px; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; border-bottom: 0.5px solid var(--border); }
  .bonus-row { display: flex; gap: 10px; padding: 10px 14px; border-top: 0.5px solid var(--border); align-items: flex-start; }
  .bonus-row:first-of-type { border-top: none; }
  .bonus-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .bonus-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .bonus-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .bonus-winner { font-size: 12px; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .winner-confirmed { color: var(--green-fg); }
  .winner-likely { color: var(--blue-fg); }
  .winner-tbd { color: var(--text3); }

  /* Games section */
  .game-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; border-top: 0.5px solid var(--border); }
  .game-row:first-of-type { border-top: none; }
  .game-teams { font-size: 13px; font-weight: 500; color: var(--text); }
  .game-owners { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .game-result { text-align: right; }
  .game-score { font-size: 12px; font-weight: 600; color: var(--green-fg); }
  .game-time { font-size: 11px; color: var(--text3); }

  /* Footer note */
  .footer-note { font-size: 10px; color: var(--text3); line-height: 1.6; padding: 0 4px; margin-top: 4px; }

  /* Loading state */
  .loading-overlay { text-align: center; padding: 40px 16px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text2); }
  .loading-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Error */
  .error-banner { background: var(--red-bg); border: 0.5px solid var(--red-fg); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 10px; font-size: 12px; color: var(--red-fg); }

  /* Last updated */
  .last-updated { font-size: 10px; color: var(--text3); text-align: center; padding: 6px 0 0; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="title">🏀 Live Calcutta Results Tracker</div>
        <div class="subtitle"><span class="dot"></span><span id="status-text">Loading live results…</span></div>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchAndRender()">↻ Refresh</button>
    </div>
  </div>
  <div class="body">
    <div id="root"><div class="loading-overlay"><div class="spinner"></div><div class="loading-text">Fetching live tournament data…</div><div class="loading-sub">Searching ESPN & NCAA for latest scores</div></div></div>

</div>

<script>
const SCORING = {r64:1,r32:2,s16:4,e8:8,f4:16,champ:24};
const TOTAL_SHARES = 187;
const TOTAL_SPEND = 1296.98;
const COLORS = {

const TEAMS = [

  {t:"Saint Mary's",c:10.25,o:'Lee'},{t:'Texas A&M',c:5.71,o:'Jack'},

  {t:'Wisconsin',c:18.49,o:'Jack'},{t:'High Point',c:3.50,o:'Sanjay'},

  {t:'Gonzaga',c:39.63,o:'Lee'},{t:'Kennesaw St.',c:1.00,o:'Sanjay'},
  {t:'U Miami (FL)',c:8.50,o:'nathan'},{t:'Missouri',c:5.75,o:'Jack'},
  {t:'Purdue',c:56.90,o:'nathan'},{t:'Queens',c:1.25,o:'Sanjay'},
  {t:'Michigan',c:145.00,o:'Lee'},{t:'UMBC/Howard',c:0.75,o:'Sanjay'},
  {t:'Georgia',c:8.47,o:'Jack'},{t:'Saint Louis',c:5.75,o:'Jack'},
  {t:'Texas Tech',c:11.25,o:'Jack'},{t:'Akron',c:3.50,o:'Jack'},
  {t:'Alabama',c:26.00,o:'Jack'},{t:'Hofstra',c:2.75,o:'Sanjay'},
  {t:'Tennessee',c:17.00,o:'Sanjay'},{t:'SMU/Miami Univ',c:3.75,o:'Lee'},
  {t:'Virginia',c:28.25,o:'Jack'},{t:'Wright St.',c:1.25,o:'Jack'},
  {t:'Kentucky',c:12.50,o:'nathan'},{t:'Santa Clara',c:2.25,o:'Lee'},
  {t:"Iowa St.",c:67.92,o:'Jack'},{t:'Tennessee St.',c:0.75,o:'Sanjay'}
];

// Baseline known results (R64 + Michigan R32 win). API fetch will supplement/override.
const BASELINE = {
  'Duke':{r64:1,alive:1},'Siena':{r64:0,alive:0},'Ohio St.':{r64:0,alive:0},
  'TCU':{r64:1,alive:1},"St. John's":{r64:1,alive:1},'Northern Iowa':{r64:0,alive:0},
  'Kansas':{r64:1,alive:1},'California Baptist':{r64:0,alive:0},
  'Louisville':{r64:1,alive:1},'South Florida':{r64:0,alive:0},
  'Michigan St.':{r64:1,alive:1},'North Dakota St.':{r64:0,alive:0},
  'UCLA':{r64:1,alive:1},'UCF':{r64:0,alive:0},'UConn':{r64:1,alive:1},
  'Furman':{r64:0,alive:0},'Florida':{r64:1,alive:1},
  'Lehigh/Prairie View':{r64:0,alive:0},'Clemson':{r64:0,alive:0},
  'Iowa':{r64:1,alive:1},'Vanderbilt':{r64:1,alive:1},'McNeese':{r64:0,alive:0},
  'Nebraska':{r64:1,alive:1},'Troy':{r64:0,alive:0},'North Carolina':{r64:0,alive:0},
  'VCU':{r64:1,alive:1},'Illinois':{r64:1,alive:1},'Penn':{r64:0,alive:0},
  "Saint Mary's":{r64:0,alive:0},'Texas A&M':{r64:1,alive:1},
  'Houston':{r64:1,alive:1},'Idaho':{r64:0,alive:0},'Arizona':{r64:1,alive:1},
  'LIU':{r64:0,alive:0},'Villanova':{r64:0,alive:0},'Utah St.':{r64:1,alive:1},
  'Wisconsin':{r64:0,alive:0},'High Point':{r64:1,alive:1},'Arkansas':{r64:1,alive:1},
  'Hawaii':{r64:0,alive:0},'BYU':{r64:0,alive:0},'NC State/Texas':{r64:1,alive:1},
  'Gonzaga':{r64:1,alive:1},'Kennesaw St.':{r64:0,alive:0},'U Miami (FL)':{r64:1,alive:1},
  'Missouri':{r64:0,alive:0},'Purdue':{r64:1,alive:1},'Queens':{r64:0,alive:0},
  'Michigan':{r64:1,r32:1,alive:1},'UMBC/Howard':{r64:0,alive:0},
  'Georgia':{r64:0,alive:0},'Saint Louis':{r64:1,r32:0,alive:0},
  'Texas Tech':{r64:1,alive:1},'Akron':{r64:0,alive:0},'Alabama':{r64:1,alive:1},
  'Hofstra':{r64:0,alive:0},'Tennessee':{r64:1,alive:1},'SMU/Miami Univ':{r64:0,alive:0},
  'Virginia':{r64:1,alive:1},'Wright St.':{r64:0,alive:0},'Kentucky':{r64:1,alive:1},
  'Santa Clara':{r64:0,alive:0},'Iowa St.':{r64:1,alive:1},'Tennessee St.':{r64:0,alive:0}
};

let RESULTS = JSON.parse(JSON.stringify(BASELINE));
let lastUpdated = null;
let isLoading = false;
let expanded = {};
let errorMsg = null;
let refreshTimer = null;
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes

function pts(team) {
  const r = RESULTS[team] || {};
  return (r.r64||0)*1+(r.r32||0)*2+(r.s16||0)*4+(r.e8||0)*8+(r.f4||0)*16+(r.champ||0)*24;
}
function isAlive(team) { return !!(RESULTS[team]||{}).alive; }
function roundLabel(team) {
  const r = RESULTS[team]||{};
  if (r.champ) return 'Champion 🏆';
  if (r.f4) return 'Final Four';
  if (r.e8) return 'Elite 8';
  if (r.s16) return 'Sweet 16';
  if (r.r32) return 'R32';
  if (r.r64) return 'R64';
  return '';
}

function buildLB() {
  return ['Jack','Lee','Sanjay','nathan'].map(name => {
    const my = TEAMS.filter(x => x.o === name);
    const spend = my.reduce((s,x) => s+x.c, 0);
    const shares = my.reduce((s,x) => s+pts(x.t), 0);
    const aliveCount = my.filter(x => isAlive(x.t)).length;
    const scoring = my.filter(x => pts(x.t) > 0);
    const stillAlive = my.filter(x => isAlive(x.t) && pts(x.t) === 0);
    const elim = my.filter(x => !isAlive(x.t) && pts(x.t) === 0);
    return {name, spend, shares, aliveCount, total: my.length, scoring, stillAlive, elim};
  }).sort((a,b) => b.shares - a.shares);
}

async function fetchAndRender() {
  if (isLoading) return;
  isLoading = true;
  errorMsg = null;
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '↻ Updating…'; btn.classList.add('spinning'); }
  document.getElementById('status-text').textContent = 'Fetching latest scores…';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        tools: [{"type":"web_search_20250305","name":"web_search"}],
        system: `You are a sports data assistant. Search for live 2026 NCAA March Madness tournament results and return ONLY a JSON object.

Each key is a team name exactly matching one from the provided list. Each value has boolean fields: r64, r32, s16, e8, f4, champ (true if they WON that round), and alive (true if still in tournament).

Only include rounds that have been completed. Omit keys for teams not yet played.
For split/play-in teams (Lehigh/Prairie View, NC State/Texas, UMBC/Howard, SMU/Miami Univ): the key is the combined name. The team that won the First Four game gets credit for all subsequent wins.
Known: NC State/Texas → Texas won First Four then beat BYU in R64 (r64:true). Michigan beat Saint Louis in R32 (r32:true, in Sweet 16). High Point upset Wisconsin in R64.

Respond ONLY with valid JSON. No markdown, no explanation, no backticks.`,
        messages: [{
          role: 'user',
          content: `Search for ALL completed 2026 NCAA tournament results as of today March 21 2026 and return JSON for these teams: ${TEAMS.map(x=>x.t).join(', ')}. Include any R32 games completed today.`
        }]
      })
    });

    const data = await resp.json();
    const textBlocks = (data.content||[]).filter(b => b.type === 'text');
    const fullText = textBlocks.map(b => b.text).join('\n');
    const clean = fullText.replace(/```json|```/g,'').trim();
    const match = clean.match(/\{[\s\S]*\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      // Merge with baseline — never remove confirmed results
      for (const [team, res] of Object.entries(parsed)) {
        if (!RESULTS[team]) RESULTS[team] = {};
        for (const [k,v] of Object.entries(res)) {
          // Only update if API says true, or if field not in baseline
          if (v === true || !(k in RESULTS[team])) {
            RESULTS[team][k] = v;
          }
        }
      }
    }
    lastUpdated = new Date();
  } catch(e) {
    errorMsg = 'Could not fetch live data. Showing last known results.';
    console.error(e);
  }

  isLoading = false;
  if (btn) { btn.textContent = '↻ Refresh'; btn.classList.remove('spinning'); }
  render();

  // Schedule next auto-refresh
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAndRender, REFRESH_INTERVAL);
}

function render() {
  const lb = buildLB();
  const totalShares = lb.reduce((s,p) => s+p.shares, 0);
  const maxShares = Math.max(...lb.map(p => p.shares), 1);
  const aliveTotal = lb.reduce((s,p) => s+p.aliveCount, 0);

  // Status text
  const statusEl = document.getElementById('status-text');
  if (statusEl) {
    statusEl.textContent = lastUpdated
      ? `Live · updated ${lastUpdated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · R32 in progress`
      : 'R64 complete · R32 in progress';
  }

  let h = '';

  if (errorMsg) {
    h += `<div class="error-banner">${errorMsg}</div>`;
  }

  // Metrics
  h += `<div class="metrics">
    <div class="metric"><div class="metric-label">Pool</div><div class="metric-value">$${TOTAL_SPEND.toFixed(0)}</div><div class="metric-sub">total auction</div></div>
    <div class="metric"><div class="metric-label">Leader</div><div class="metric-value">${lb[0].name.charAt(0).toUpperCase()+lb[0].name.slice(1)}</div><div class="metric-sub">${lb[0].shares} shares · ${((lb[0].shares/TOTAL_SHARES)*100).toFixed(0)}% of pool</div></div>
    <div class="metric"><div class="metric-label">Shares earned</div><div class="metric-value">${totalShares}</div><div class="metric-sub">of 187 possible</div></div>
    <div class="metric"><div class="metric-label">Teams alive</div><div class="metric-value">${aliveTotal}</div><div class="metric-sub">still in tournament</div></div>
  </div>`;

  // Player cards
  h += `<div class="cards">`;
  const rankClass = ['gold','silver','bronze','fourth'];
  lb.forEach((p, i) => {
    const c = COLORS[p.name] || {bg:'#eee',fg:'#555'};
    const pct = (p.shares / maxShares * 100).toFixed(1);
    const expectedPayout = (p.shares / TOTAL_SHARES) * TOTAL_SPEND;
    const roi = ((expectedPayout - p.spend) / p.spend * 100);
    const roiStr = (roi >= 0 ? '+' : '') + roi.toFixed(0) + '% ROI';
    const roiCls = roi > 5 ? 'roi-pos' : roi < -5 ? 'roi-neg' : 'roi-neu';
    const init = p.name.slice(0,2).toUpperCase();
    const isOpen = expanded[p.name];
    const disp = p.name.charAt(0).toUpperCase() + p.name.slice(1);

    h += `<div class="card" id="card-${p.name}">
      <div class="card-header" onclick="toggleCard('${p.name}')">
        <div class="card-row">
          <div class="rank ${rankClass[i]}">${i+1}</div>
          <div class="avatar" style="background:${c.bg};color:${c.fg}">${init}</div>
          <div style="flex:1;min-width:0">
            <div class="player-name">${disp}</div>
            <div class="player-sub">${p.total} teams · $${p.spend.toFixed(0)} spent · ${p.aliveCount} alive</div>
          </div>
          <div class="card-right">
            <div><span class="pts-big">${p.shares}</span></div>
            <div class="pts-lbl">shares</div>
            <div class="roi-badge ${roiCls}">${roiStr}</div>
          </div>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${c.fg}"></div></div>
        <div class="toggle-hint">${isOpen ? '▲ hide' : '▼ show teams'}</div>
      </div>
      <div class="card-detail ${isOpen ? 'open' : ''}">`;

    if (p.scoring.length) {
      h += `<div class="detail-section"><div class="section-title">Scoring <span>${p.scoring.length}</span></div><div class="team-list">`;
      p.scoring.forEach(x => {
        const s = pts(x.t); const rl = roundLabel(x.t);
        h += `<div class="team-row scoring"><span class="team-name">${x.t}${rl ? `<span class="round-pill">${rl}</span>` : ''}</span><span class="team-val">+${s} pts</span></div>`;
      });
      h += `</div></div>`;
    }
    if (p.stillAlive.length) {
      h += `<div class="detail-section"><div class="section-title">Still alive — no wins yet <span>${p.stillAlive.length}</span></div><div class="team-list">`;
      p.stillAlive.forEach(x => {
        h += `<div class="team-row alive"><span class="team-name">${x.t}</span><span class="team-val">$${x.c.toFixed(2)}</span></div>`;
      });
      h += `</div></div>`;
    }
    if (p.elim.length) {
      h += `<div class="detail-section"><div class="section-title">Eliminated <span>${p.elim.length}</span></div><div class="team-list">`;
      p.elim.forEach(x => {
        h += `<div class="team-row elim"><span class="team-name">${x.t}</span><span class="team-val">$${x.c.toFixed(2)}</span></div>`;
      });
      h += `</div></div>`;
    }

    h += `</div></div>`;
  });
  h += `</div>`;

  // Bonus awards
  h += `<div class="section-card">
    <div class="section-head">Bonus Awards · 1 share each</div>
    <div class="bonus-row">
      <div class="bonus-icon">🏆</div>
      <div>
        <div class="bonus-title">Biggest upset</div>
        <div class="bonus-desc">High Point (#12) 83 – Wisconsin (#5) 82 · 7-seed differential</div>
        <div class="bonus-winner winner-confirmed">✓ Confirmed — Sanjay (owns High Point)</div>
      </div>
    </div>
    <div class="bonus-row">
      <div class="bonus-icon">💥</div>
      <div>
        <div class="bonus-title">Biggest blowout victim</div>
        <div class="bonus-desc">Florida 114 – Lehigh 55 · 59-pt margin (2nd largest in tournament history)</div>
        <div class="bonus-winner winner-likely">⟳ Likely — Lee (owns Florida) · pending end of tournament</div>
      </div>
    </div>
    <div class="bonus-row">
      <div class="bonus-icon">🌀</div>
      <div>
        <div class="bonus-title">Lowest seed in Final Four</div>
        <div class="bonus-desc">Awarded at end of tournament</div>
        <div class="bonus-winner winner-tbd">TBD</div>
      </div>
    </div>
  </div>`;

  // Today's R32 games
  const games = [
    {t:'Michigan vs Saint Louis', score:'Michigan 95–72 ✓', owners:'Lee / Jack', done:true},
    {t:'Michigan St. vs Louisville', time:'2:45p CBS', owners:'Jack / Lee', done:false},
    {t:'Duke vs TCU',               time:'5:15p CBS', owners:'Jack / Lee', done:false},
    {t:'Houston vs Texas A&M',      time:'6:10p TNT', owners:'Lee / Jack', done:false},
    {t:'Gonzaga vs Texas',          time:'7:10p TBS', owners:'Lee / Jack', done:false},
    {t:'Illinois vs VCU',           time:'7:50p CBS', owners:'Lee / Jack', done:false},
    {t:'Nebraska vs Vanderbilt',    time:'8:45p TNT', owners:'Jack / nathan', done:false},
    {t:'Arkansas vs High Point',    time:'9:45p TBS', owners:'Lee / Sanjay', done:false},
  ];

  h += `<div class="section-card">
    <div class="section-head">Today's R32 Games · Sat Mar 21</div>`;
  games.forEach(g => {
    h += `<div class="game-row">
      <div>
        <div class="game-teams">${g.t}</div>
        <div class="game-owners">${g.owners}</div>
      </div>
      <div class="game-result">
        ${g.done ? `<div class="game-score">${g.score}</div>` : `<div class="game-time">${g.time}</div>`}
      </div>
    </div>`;
  });
  h += `</div>`;

  if (lastUpdated) {
    h += `<div class="last-updated">Last updated ${lastUpdated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})} · Auto-refreshes every 5 min</div>`;
  }

  h += `<div class="footer-note">Scoring: 1pt R64 win · 2pt R32 · 4pt S16 · 8pt E8 · 16pt F4 · 24pt Championship · 1pt each bonus award. ROI = (expected payout based on current shares ÷ 187 × total pool) − spend. Play-in teams: winner of First Four gets full credit for any subsequent wins.</div>`;

  document.getElementById('root').innerHTML = h;
}

function toggleCard(name) {
  expanded[name] = !expanded[name];
  render();
}

// Initial render with baseline, then fetch live data
render();
fetchAndRender();
</script>
</body>
</html>
