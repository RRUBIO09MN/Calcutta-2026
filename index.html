<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Live Calcutta Results Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f2f2f0;
  --surface3: #e8e8e5;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --jack: #0066cc;
  --lee: #007a47;
  --sanjay: #cc3300;
  --Nathan: #7744cc;
  --green: #007a47;
  --red: #cc2200;
  --gold: #b8860b;
  --silver: #888;
  --bronze: #8b5a2b;
  --radius: 10px;
  --radius-sm: 7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; min-height: 100vh; }
.page { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

.header { background: #cc0000; padding: 12px 14px 10px; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.subtitle { font-size: 10px; color: rgba(255,255,255,.75); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #7aff7a; flex-shrink: 0; animation: pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.2} }
.hbtn { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: #fff; cursor: pointer; font-family: 'Outfit', sans-serif; white-space: nowrap; }
.hbtn:active { opacity: .7; }

.scoreboard { background: #111; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; padding: 0 4px; scrollbar-width: none; }
.scoreboard::-webkit-scrollbar { display: none; }
.score-item { display: inline-flex; flex-direction: column; padding: 6px 10px; border-right: 1px solid #333; vertical-align: top; min-width: 110px; }
.score-item:last-child { border-right: none; }
.score-label { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #888; margin-bottom: 3px; }
.score-teams { display: flex; flex-direction: column; gap: 2px; }
.score-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.score-team { font-size: 12px; font-weight: 500; color: #ccc; }
.score-team.winner { font-weight: 700; color: #fff; }
.score-pts { font-size: 12px; font-weight: 700; color: #ccc; min-width: 20px; text-align: right; }
.score-pts.winner { color: #7aff7a; }
.score-upcoming { font-size: 10px; color: #aaa; padding: 8px 0 4px; }
.score-owner { font-size: 9px; color: #666; margin-top: 2px; }

.body { padding: 12px 10px 0; }

.slabel { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; padding-left: 2px; display: flex; align-items: center; gap: 6px; }
.slabel::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.lb-strips { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.lbs { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.lbs-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.lbs-name { font-size: 11px; font-weight: 600; color: var(--text); }
.lbs-sub { font-size: 10px; color: var(--text3); }
.lbs-rows { padding: 2px 0; }
.lbr { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
.lbr-rank { font-size: 12px; font-weight: 700; min-width: 16px; text-align: center; }
.lbr-rank.r1{color:var(--gold)}.lbr-rank.r2{color:var(--silver)}.lbr-rank.r3{color:var(--bronze)}.lbr-rank.r4{color:var(--text3)}
.lbr-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.lbr-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.lbr-track { width: 75px; height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.lbr-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.lbr-val { font-size: 12px; font-weight: 600; min-width: 56px; text-align: right; }
.lbr-val.pos{color:var(--green)}.lbr-val.neg{color:var(--red)}.lbr-val.neu{color:var(--text2)}

.metrics { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 14px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.metric-lbl { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
.metric-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -.01em; }
.metric-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

.cards { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-hdr { padding: 12px 13px; cursor: pointer; user-select: none; }
.card-hdr:active { background: var(--surface2); }

.card-toprow { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
.av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.cinfo { flex: 1; min-width: 0; }
.cname { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
.csub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.cright { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.pts-big { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -.02em; }
.pts-lbl { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); }
.roi-chip { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.chip-pos{background:#e8f5ee;color:var(--green)}
.chip-neg{background:#fdecea;color:var(--red)}
.chip-neu{background:var(--surface2);color:var(--text2)}

.fin { margin-bottom: 10px; }
.fin-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.fin-lbl { font-size: 10px; font-weight: 600; color: var(--text3); min-width: 46px; letter-spacing: .02em; }
.fin-track { flex: 1; height: 7px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.fin-fill { height: 100%; border-radius: 4px; transition: width .65s cubic-bezier(.4,0,.2,1); }
.fin-val { font-size: 11px; font-weight: 600; min-width: 40px; text-align: right; color: var(--text2); }
.pnl-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: 6px; padding: 6px 10px; margin-top: 3px; }
.pnl-lbl { font-size: 11px; color: var(--text2); }
.pnl-val { font-size: 13px; font-weight: 700; }
.pnl-pos{color:var(--green)}.pnl-neg{color:var(--red)}.pnl-neu{color:var(--text2)}

.sbar { height: 3px; background: var(--surface3); border-radius: 2px; margin-bottom: 6px; }
.sbar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.tog-hint { text-align: center; font-size: 10px; color: var(--text3); }

.card-detail { border-top: 1px solid var(--border); padding: 10px 13px; display: none; }
.card-detail.open { display: block; }
.dsec { margin-bottom: 9px; }
.dsec:last-child { margin-bottom: 0; }
.dsec-title { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; display: flex; justify-content: space-between; }
.tlist { display: flex; flex-direction: column; gap: 3px; }
.trow { display: flex; justify-content: space-between; align-items: center; padding: 5px 9px; border-radius: 6px; font-size: 12px; }
.trow.sc{background:#e8f5ee;border:1px solid #b3dfc5}
.trow.al{background:var(--surface2);border:1px solid var(--border)}
.trow.el{opacity:.35;background:var(--surface2);border:1px solid var(--border)}
.tn{font-weight:500;color:var(--text);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.trow.sc .tn{color:var(--green)}
.rpill{font-size:9px;background:#dbeeff;color:#0055aa;padding:1px 5px;border-radius:4px;font-weight:700}
.tv{font-size:11px;color:var(--text2);flex-shrink:0;margin-left:4px;text-align:right}
.trow.sc .tv{color:var(--green);font-weight:600}
.trow.al .tv{color:var(--text3)}

.sblock { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
.sblock-head { background: var(--surface2); padding: 8px 13px; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); }
.brow { display: flex; gap: 10px; padding: 10px 13px; border-top: 1px solid var(--border); align-items: flex-start; }
.brow:first-of-type{border-top:none}
.bicon{font-size:17px;flex-shrink:0;margin-top:1px}
.btitle{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.bdesc{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:3px}
.bwin{font-size:11px;font-weight:600}
.w-like{color:#0066aa}.w-tbd{color:var(--text3)}

.grow{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;border-top:1px solid var(--border)}
.grow:first-of-type{border-top:none}
.gteams{font-size:13px;font-weight:500;color:var(--text)}
.gowners{font-size:10px;color:var(--text3);margin-top:1px}
.gscore{font-size:12px;font-weight:700;color:var(--green)}
.gtime{font-size:11px;color:var(--text3)}

.api-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.api-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.api-desc{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.api-row{display:flex;gap:6px}
.api-inp{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);outline:none;font-family:'Outfit',sans-serif}
.api-inp:focus{border-color:#0066cc}
.api-inp::placeholder{color:var(--text3)}
.api-btn{background:#0066cc;color:#fff;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}

.err-banner{background:#fdecea;border:1px solid #f5b8b4;border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--red);line-height:1.4}
.last-upd{font-size:10px;color:var(--text3);text-align:center;padding:6px 4px 0}
.footer-note{font-size:10px;color:var(--text3);line-height:1.6;padding:8px 4px 0}
.lbr-track-stack{width:75px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;display:flex;}
.lbr-fill-cur{height:100%;flex-shrink:0;}
.lbr-fill-upside{height:100%;flex-shrink:0;opacity:0.45;}
.lbr-val2{font-size:10px;color:var(--text3);min-width:56px;text-align:right;margin-top:1px;}
.upside-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);}
.sbtable{width:100%;border-collapse:collapse;font-family:'Outfit',sans-serif;}
.sbtable th{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:7px 8px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
.sbtable th.left{text-align:left;}
.sbtable td{font-size:12px;padding:9px 8px;text-align:right;border-bottom:1px solid var(--border);vertical-align:middle;}
.sbtable td.left{text-align:left;}
.sbtable tr:last-child td{border-bottom:none;}
.sbtable tr:hover td{background:var(--surface2);}
.sb-rank{font-size:12px;font-weight:700;width:18px;text-align:center;}
.sb-player{display:flex;align-items:center;gap:8px;}
.sb-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.sb-name{font-size:13px;font-weight:600;color:var(--text);}
.sb-sub{font-size:10px;color:var(--text3);}
.sb-pnl-pos{color:var(--green);font-weight:700;}
.sb-pnl-neg{color:var(--red);font-weight:700;}
.sb-pnl-neu{color:var(--text2);font-weight:700;}
.sb-max{color:var(--text2);font-weight:600;}
.sb-pts{color:var(--text);font-weight:500;}
.upside-row:last-child{border-bottom:none;}
.upside-rank{font-size:12px;font-weight:700;min-width:16px;text-align:center;}
.upside-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.upside-mid{flex:1;min-width:0;}
.upside-name{font-size:13px;font-weight:600;color:var(--text);}
.upside-bar-wrap{margin-top:4px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;display:flex;}
.upside-bar-cur{height:100%;}
.upside-bar-pot{height:100%;opacity:0.3;}
.upside-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.upside-max{font-size:14px;font-weight:700;color:var(--green);}
.upside-pnl-chip{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;white-space:nowrap;}
.chip-g{background:#e8f5ee;color:#007a47;}
.chip-r{background:#fdecea;color:#cc2200;}
.chip-n{background:var(--surface2);color:var(--text3);}
.chgkey{display:block;text-align:center;padding:6px;font-size:10px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;width:100%}

/* ── Bracket ── */
.bracket-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.bracket-region{border-bottom:1px solid var(--border);padding:10px 12px}
.bracket-region:last-child{border-bottom:none}
.bracket-region-name{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.bracket-matchup{display:flex;align-items:stretch;gap:0;margin-bottom:6px}
.bracket-matchup:last-child{margin-bottom:0}
.bracket-team{flex:1;display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:5px 0 0 5px;min-width:0}
.bracket-team+.bracket-team{border-radius:0 5px 5px 0;border-left:none}
.bracket-seed{font-size:9px;font-weight:700;color:var(--text3);min-width:13px;text-align:center}
.bracket-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.bracket-owner-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bracket-vs{display:flex;align-items:center;padding:0 4px;font-size:9px;font-weight:700;color:var(--text3);background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.bracket-time{font-size:9px;color:#f0a500;font-weight:600;margin-top:2px;padding-left:2px}
.bracket-elim .bracket-name{color:var(--text3);text-decoration:line-through;opacity:.5}
.bracket-alive .bracket-name{color:var(--text);font-weight:600}

/* ── Final Four Bracket ── */
.f4-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.f4-inner{padding:12px 10px 10px;}
.f4-grid{display:grid;grid-template-columns:1fr 36px 1fr;gap:0;align-items:center;}
.f4-semifinal{display:flex;flex-direction:column;gap:6px;}
.f4-game{display:flex;flex-direction:column;gap:4px;}
.f4-team{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);position:relative;transition:background .2s;}
.f4-team.winner{background:#e8f5ee;border-color:#b3dfc5;}
.f4-team.tbd{opacity:.5;}
.f4-logo{width:26px;height:26px;object-fit:contain;flex-shrink:0;}
.f4-logo-placeholder{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.f4-tinfo{flex:1;min-width:0;}
.f4-tname{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.f4-owner{font-size:9px;color:var(--text3);margin-top:1px;}
.f4-seed{font-size:9px;font-weight:700;color:var(--text3);min-width:12px;text-align:right;flex-shrink:0;}
.f4-connector{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:0 2px;}
.f4-line{width:2px;flex:1;background:var(--border2);}
.f4-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.f4-champ-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 4px;}
.f4-champ-label{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:center;}
.f4-champ-slot{display:flex;flex-direction:column;gap:3px;width:100%;}
.f4-champ-team{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);transition:background .2s;}
.f4-champ-team.live-bracket{background:#fff8e8;border-color:#f0c040;}
.f4-champ-team.tbd{opacity:.45;}
.f4-vs-center{font-size:9px;font-weight:700;color:var(--text3);text-align:center;line-height:1;}
.f4-region-tag{font-size:8px;color:var(--text3);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:2px;text-align:center;}
.f4-pending-banner{text-align:center;padding:14px 12px;font-size:11px;color:var(--text3);font-style:italic;}

/* ── Standings mode toggle ── */
.standings-toggle-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 2px;
}
.standings-toggle-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}
.standings-toggle-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.mode-toggle {
  display: flex;
  align-items: center;
  background: var(--surface3);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
  position: relative;
  cursor: pointer;
  user-select: none;
  border: 1px solid var(--border2);
  -webkit-tap-highlight-color: transparent;
}
.mode-toggle-pill {
  position: absolute;
  top: 3px;
  left: 3px;
  width: calc(50% - 3px);
  height: calc(100% - 6px);
  background: #fff;
  border-radius: 100px;
  box-shadow: 0 1px 4px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.06);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.mode-toggle.shares-mode .mode-toggle-pill {
  transform: translateX(100%);
}
.mode-btn {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  color: var(--text3);
  transition: color .22s ease;
  white-space: nowrap;
  min-width: 70px;
  justify-content: center;
}
.mode-toggle.dollars-mode .mode-btn.btn-dollars { color: var(--text); }
.mode-toggle.shares-mode .mode-btn.btn-shares { color: var(--text); }
.mode-btn .btn-icon { font-size: 13px; line-height: 1; }

/* Fade cells on toggle */
.sbtable td .cell-val {
  display: inline-block;
  transition: opacity .18s ease, transform .18s ease;
}
.sbtable.toggling td .cell-val {
  opacity: 0;
  transform: translateY(4px);
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="title">2026 Calcutta</div>
        <div class="subtitle"><span class="dot"></span><span id="status-text">Loading…</span></div>
      </div>
      <button class="hbtn" id="refresh-btn">↻ Refresh</button>
    </div>

function getF4Team(slot) {
  const game = E8_GAMES.find(g => g.region === slot.region);
  if (!game) return null;

  const liveKey = 'e8:' + game.t;
  const live = liveScores[liveKey];

  function ownerFor(name) {
    return TEAMS.find(x => x.t === name)?.o || '?';
  }

  if (game.done) {
    const winner = game.as > game.bs ? game.a : game.b;
    // Exact match first, then startsWith only if followed by end-of-string (avoid Michigan→Michigan St.)
    const canon = Object.keys(RESULTS).find(k => k === winner)
      || Object.keys(RESULTS).find(k => k.toLowerCase() === winner.toLowerCase())
      || winner;
    return { name: canon, owner: ownerFor(canon), confirmed: true, seed: TEAM_SEED[canon] || '' };
  } else if (live && live.status === 'final') {
    const winner = live.as > live.bs ? live.a : live.b;
    const canon = Object.keys(RESULTS).find(k => k === winner)
      || Object.keys(RESULTS).find(k => k.toLowerCase() === winner.toLowerCase())
      || winner;
    return { name: canon, owner: ownerFor(canon), confirmed: true, seed: TEAM_SEED[canon] || '' };
  } else if (live && live.status === 'live') {
    const leadShort = live.as >= live.bs ? live.a : live.b;
    const canon = Object.keys(RESULTS).find(k => k === leadShort)
      || Object.keys(RESULTS).find(k => k.toLowerCase() === leadShort.toLowerCase())
      || leadShort;
    const score = live.as >= live.bs ? `${live.as}-${live.bs}` : `${live.bs}-${live.as}`;
    return { name: canon, owner: ownerFor(canon), confirmed: false, live: true, clock: live.clock, score, seed: TEAM_SEED[canon] || '' };
  }
  return null;
}

  h += `<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;">`;

  h += `</div></div>`; // end f4-inner, f4-wrap
  return h;
}

function espnRoundToKey(h) {
  if (!h) return null;
  const r = h.toLowerCase();
  if (r.includes('first four') || r.includes('first round')) return 'r64';
  if (r.includes('2nd round') || r.includes('second round')) return 'r32';
  if (r.includes('sweet 16') || r.includes('regional semifinal')) return 's16';
  if (r.includes('elite eight') || r.includes('regional final') || r.includes('elite 8')) return 'e8';
  if (r.includes('final four') || r.includes('national semifinal')) return 'f4';
  if (r.includes('national championship')) return 'champ';
  return null;
}

async function fetchLiveScores() {
  try {
    let data;
    try {
      const resp = await fetch(WORKER_URL, {cache:'no-store'});
      if (resp.ok) data = await resp.json();
    } catch(e) {}
    if (!data) {
      const resp = await fetch(ESPN_DIRECT, {cache:'no-store'});
      if (resp.ok) data = await resp.json();
    }
    if (!data) return;
    const events = data.events || [];
    console.log(`[Calcutta] Worker returned ${events.length} events`);
    for (const event of events) {
      const comp = event.competitions?.[0];
      if (!comp) continue;
      const headline = comp.notes?.[0]?.headline || '';
      const roundKey = espnRoundToKey(headline);
      const teams = (comp.competitors||[]).map(c=>c.team?.displayName).join(' vs ');
      console.log(`[Calcutta] Event: ${teams} | headline: ${JSON.stringify(headline)} | round: ${roundKey} | status: ${comp.status?.type?.name}`);
      if (!roundKey) continue;

      const statusType = comp.status?.type?.name;
      const isLive = statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_HALFTIME' || statusType === 'STATUS_OVERTIME' || statusType === 'STATUS_END_PERIOD';
      const isFinal = statusType === 'STATUS_FINAL' || statusType === 'STATUS_FINAL_OT';
      if (!isLive && !isFinal) continue;

      const competitors = comp.competitors || [];
      if (competitors.length !== 2) continue;
      // Always put home team first (top/left), away team second (bottom/right)
      const cHome = competitors.find(c=>c.homeAway==='home') || competitors[0];
      const cAway = competitors.find(c=>c.homeAway==='away') || competitors[1];
      const c0 = cHome, c1 = cAway;
      const d0 = c0.team?.displayName || '', d1 = c1.team?.displayName || '';
      const s0 = parseInt(c0.score)||0, s1 = parseInt(c1.score)||0;
      const n0 = SHORT[d0] || d0.split(' ').pop();
      const n1 = SHORT[d1] || d1.split(' ').pop();

      // Harvest logo URLs from ESPN API — use the largest available logo
      for (const [c, displayName] of [[c0, d0],[c1, d1]]) {
        const canonName = ESPN_MAP[displayName];
        if (canonName && !teamLogos[canonName]) {
          const logos = c.team?.logos || [];
          // Prefer a mid-size logo (not the tiny ones); pick first available
          const logo = logos.find(l=>l.width>=50) || logos[0];
          if (logo?.href) teamLogos[canonName] = logo.href;
        }
      }
      const clock = comp.status?.displayClock || '';
      const half = comp.status?.period || 1;
      const clockStr = isFinal ? 'Final' :
        statusType==='STATUS_HALFTIME' ? 'Half' :
        `${half>1?'2nd':'1st'} · ${clock}`;

      // Match to SUN_GAMES first, then S16_GAMES, then E8_GAMES
      let match = SUN_GAMES.find(g => {
        if (g.done) return false;
        const gt = g.t.toLowerCase();
        return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
               (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
      });
      let isS16Game = false;
      if (!match && roundKey === 's16') {
        match = S16_GAMES.find(g => {
          if (g.done) return false;  // skip already-finalized S16 games
          const gt = g.t.toLowerCase();
          return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
                 (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
        });
        isS16Game = !!match;
      }
      let isE8Game = false;
      if (!match && roundKey === 'e8') {
        match = E8_GAMES.find(g => {
          if (g.done) return false;
          const gt = g.t.toLowerCase();
          return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
                 (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
        });
        isE8Game = !!match;
      }
      let isF4Game = false;
      if (!match && roundKey === 'f4') {
        match = F4_GAMES.find(g => {
          if (g.done) return false;
          const gt = g.t.toLowerCase();
          return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
                 (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
        });
        isF4Game = !!match;
      }
      const scoreKey = isS16Game ? 's16:'+match?.t : isE8Game ? 'e8:'+match?.t : isF4Game ? 'f4:'+match?.t : match?.t;

      if (match) {
        liveScores[scoreKey] = {a:n0,as:s0,b:n1,bs:s1,status:isFinal?'final':'live',clock:clockStr};
      }

      // Update RESULTS for completed games — derive round from tournament date
      if (isFinal) {
        if (match && isF4Game) {
          // F4 game completed
          const winner0 = (c0.winner === true) || (c0.winner === undefined && s0 > s1);
          const winner1 = (c1.winner === true) || (c1.winner === undefined && s1 > s0);
          for (const [c, isWinner] of [[c0, winner0],[c1, winner1]]) {
            const ourName = ESPN_MAP[c.team?.displayName];
            if (!ourName || !RESULTS[ourName]) continue;
            if (isWinner) {
              RESULTS[ourName].f4 = 1;
              RESULTS[ourName].alive = 1;
            } else {
              RESULTS[ourName].f4 = 0;
              RESULTS[ourName].alive = 0;
            }
          }
          if (!match.done) {
            match.done = true;
            match.a = n0; match.as = s0;
            match.b = n1; match.bs = s1;
          }
        } else if (match && isE8Game) {
          // E8 game completed
          const winner0 = (c0.winner === true) || (c0.winner === undefined && s0 > s1);
          const winner1 = (c1.winner === true) || (c1.winner === undefined && s1 > s0);
          for (const [c, isWinner] of [[c0, winner0],[c1, winner1]]) {
            const ourName = ESPN_MAP[c.team?.displayName];
            if (!ourName || !RESULTS[ourName]) continue;
            if (isWinner) {
              RESULTS[ourName].e8 = 1;
              RESULTS[ourName].alive = 1;
            } else {
              RESULTS[ourName].e8 = 0;
              RESULTS[ourName].alive = 0;
            }
          }
          if (!match.done) {
            match.done = true;
            match.a = n0; match.as = s0;
            match.b = n1; match.bs = s1;
          }
        } else if (match && isS16Game) {
          // S16 game completed
          const winner0 = (c0.winner === true) || (c0.winner === undefined && s0 > s1);
          const winner1 = (c1.winner === true) || (c1.winner === undefined && s1 > s0);
          for (const [c, isWinner] of [[c0, winner0],[c1, winner1]]) {
            const ourName = ESPN_MAP[c.team?.displayName];
            if (!ourName || !RESULTS[ourName]) continue;
            if (isWinner) {
              RESULTS[ourName].s16 = 1;
              RESULTS[ourName].alive = 1;
            } else {
              RESULTS[ourName].s16 = 0;
              RESULTS[ourName].alive = 0;
            }
          }
          if (!match.done) {
            match.done = true;
            match.a = n0; match.as = s0;
            match.b = n1; match.bs = s1;
          }
        } else if (match) {
          // R32 game — always r32 key for SUN_GAMES
          const winner0 = (c0.winner === true) || (c0.winner === undefined && s0 > s1);
          const winner1 = (c1.winner === true) || (c1.winner === undefined && s1 > s0);
          for (const [c, isWinner] of [[c0, winner0],[c1, winner1]]) {
            const ourName = ESPN_MAP[c.team?.displayName];
            if (!ourName || !RESULTS[ourName]) continue;
            if (isWinner) {
              RESULTS[ourName].r32 = 1;
              RESULTS[ourName].alive = 1;
            } else {
              if (!RESULTS[ourName].r32) RESULTS[ourName].r32 = 0;
              RESULTS[ourName].alive = 0;
            }
          }
          if (!match.done) {
            match.done = true;
            match.a = n0; match.as = s0;
            match.b = n1; match.bs = s1;
          }
        }
      }
    }

    const liveCount = Object.values(liveScores).filter(s=>s.status==='live').length;
    const pendingGames = S16_GAMES.filter(g => !g.done).length + E8_GAMES.filter(g => !g.done).length;
    const el = document.getElementById('status-text');
    if (el) el.textContent = `✓ ESPN live · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${liveCount?` · ${liveCount} game${liveCount>1?'s':''} live`:''}`;
    renderScoreboard();
    render();

    // Poll aggressively: 2 min if games live, 60s if games pending today, 5 min if all done
    const nextPoll = liveCount > 0 ? 2*60*1000 : pendingGames > 0 ? 60*1000 : 5*60*1000;
    setTimeout(fetchLiveScores, nextPoll);
  } catch(e) {
    console.warn('Worker fetch failed:', e.message, e);
    const el = document.getElementById('status-text');
    if(el) el.textContent = 'ESPN fetch failed: ' + e.message + ' — retrying in 5 min';
    setTimeout(fetchLiveScores, 5*60*1000);
  }
}


function pts(team){const r=RESULTS[team]||{};return(r.r64||0)*1+(r.r32||0)*2+(r.s16||0)*4+(r.e8||0)*8+(r.f4||0)*16+(r.champ||0)*24;}
function isAlive(t){return!!(RESULTS[t]||{}).alive;}
function rlabel(t){const r=RESULTS[t]||{};if(r.champ)return'Champ';if(r.f4)return'Final 4';if(r.e8)return'Elite 8';if(r.s16)return'Sweet 16';if(r.r32)return'R32';if(r.r64)return'R64';return'';}

// Bonus shares awarded per player (1pt each = 1 share)
// Biggest blowout victim → Sanjay, Biggest upset → Jack, Lowest seed F4 → Lee
const BONUS_PTS = { Jack:1, Lee:1, Sanjay:1, Nathan:0 };
// Bracket: East vs South, West vs Midwest in F4
// S16 matchups → E8 pairs → F4 pairs → Championship
const BRACKET = {
  s16: [
    // [teamA, teamB, region, side]  — only one can advance
    ['Texas','NC State/Texas'],      // West S16 (Texas owns NC State/Texas slot)
    ['Purdue',null],                 // West S16 other team (no alias needed, same game above)
    // We model per-game as objects below
  ]
};

// S16 games as [teamA, teamB, region, f4side]
// f4side: 'WM' = West/Midwest half, 'ES' = East/South half
const S16_BRACKET = [
  {a:'NC State/Texas', b:'Purdue',    region:'West',    f4:'WM'},
  {a:'Iowa',           b:'Nebraska',  region:'South',   f4:'ES'},
  {a:'Arkansas',       b:'Arizona',   region:'West',    f4:'WM'},
  {a:'Illinois',       b:'Houston',   region:'South',   f4:'ES'},
  {a:"St. John's",     b:'Duke',      region:'East',    f4:'ES'},
  {a:'Alabama',        b:'Michigan',  region:'Midwest', f4:'WM'},
  {a:'Michigan St.',   b:'UConn',     region:'East',    f4:'ES'},
  {a:'Tennessee',      b:'Iowa St.',  region:'Midwest', f4:'WM'},
];

// E8 pairs: winners of same-region S16 games meet
// West: (Texas/Purdue) vs (Arkansas/Arizona)
// South: (Iowa/Nebraska) vs (Illinois/Houston)
// East: (St John's/Duke) vs (Mich St/UConn)
// Midwest: (Alabama/Michigan) vs (Tennessee/Iowa St.)

// F4 pairs by side:
// WM side: West winner vs Midwest winner
// ES side: East winner vs South winner
// Championship: WM winner vs ES winner

function maxFuturePts(playerTeams) {
  // playerTeams: array of team name strings that are still alive for this player
  // Only counts points NOT YET EARNED — checks RESULTS to know which rounds are already won.
  const owned = new Set(playerTeams);
  let total = 0;
  const f4BySide = {}; // 'WM'|'ES' -> count of regions player has a team reaching F4

  // Helper: has this team already won a given round?
  function wonRound(team, round) { return !!((RESULTS[team]||{})[round]); }

  // We iterate per region. For each region we figure out:
  //   - which owned teams are still alive heading into S16, E8, or already past E8 (i.e. F4-bound)
  //   - what future points are possible from that region for this player

  for (const region of ['West','East','South','Midwest']) {
    // All S16_BRACKET games for this region
    const regionGames = S16_BRACKET.filter(g => g.region === region);
    // f4side is the same for both games in a region
    const f4side = regionGames[0].f4;

    // Categorise each owned+alive team in this region by their current status:
    //   'e8won'  — already won E8, waiting for F4
    //   'e8pending' — won S16, E8 not yet played (alive, no e8 result yet)
    //   's16pending' — won R32/R64, S16 not yet played
    // (Teams eliminated at any stage won't be in playerTeams since isAlive filters them out)

    let hasE8Won = false;     // ≥1 owned team already won E8 in this region
    let hasE8Pending = false; // ≥1 owned team in E8 (won S16, e8 result pending)
    let s16PendingGames = new Set(); // distinct S16 games (by game.a) where player has a team

    for (const game of regionGames) {
      const hasA = owned.has(game.a);
      const hasB = owned.has(game.b);
      if (!hasA && !hasB) continue;

      // For each owned team in this game, classify it
      for (const [hasTeam, teamName] of [[hasA, game.a],[hasB, game.b]]) {
        if (!hasTeam) continue;
        const r = RESULTS[teamName] || {};
        if (r.e8) {
          // Already won E8 — heading to F4
          hasE8Won = true;
        } else if (r.s16) {
          // Won S16, E8 still to play
          hasE8Pending = true;
        } else {
          // Still in S16 (won R32 but S16 not yet played)
          s16PendingGames.add(game.a); // use game.a as unique game key
        }
      }
    }

    // Now tally future points for this region:
    // S16: each distinct pending S16 game where player has a team → +4 once per game
    //      (if player owns both teams in a game, still only +4)
    total += s16PendingGames.size * 4;

    // E8: player gets +8 if they have any team that could win E8 in this region
    //     That means: a team already in E8 (pending result) OR a team that will reach E8 via S16
    //     hasE8Won teams already earned E8 pts — skip
    //     hasE8Pending → could win E8 → +8
    //     s16PendingGames → winner reaches E8 → +8 (but only add once per region)
    const couldWinE8 = hasE8Pending || s16PendingGames.size > 0;
    if (couldWinE8) total += 8;

    // This region contributes a team to F4 in best case if:
    //   - already won E8 (guaranteed F4 spot), OR
    //   - could win E8
    if (hasE8Won || couldWinE8) {
      if (!f4BySide[f4side]) f4BySide[f4side] = 0;
      f4BySide[f4side]++;
    }
  }

  // F4: one win per side (WM or ES), regardless of how many regions player covers on that side
  for (const side of ['WM','ES']) {
    if ((f4BySide[side]||0) > 0) total += 16;
  }

  // Championship: one win, regardless of how many sides covered
  const hasAnySide = (f4BySide['WM']||0) > 0 || (f4BySide['ES']||0) > 0;
  if (hasAnySide) total += 24;

  return total;
}

function buildLB(){
  return['Jack','Lee','Sanjay','Nathan'].map(name=>{
    const my=TEAMS.filter(x=>x.o===name);
    const spend=my.reduce((s,x)=>s+x.c,0);
    const teamShares=my.reduce((s,x)=>s+pts(x.t),0);
    const bonusShares=BONUS_PTS[name]||0;
    const shares=teamShares+bonusShares;
    const aliveCount=my.filter(x=>isAlive(x.t)).length;
    const earnedBack=(shares/TOTAL_SHARES)*TOTAL_SPEND;
    const profit=earnedBack-spend;
    const roi=(profit/spend)*100;
    const aliveTeams=my.filter(x=>isAlive(x.t)).map(x=>x.t);
    const maxFuture=maxFuturePts(aliveTeams);
    const maxShares=shares+maxFuture;
    const maxEarned=(maxShares/TOTAL_SHARES)*TOTAL_SPEND;
    const maxProfit=maxEarned-spend;
    return{name,spend,shares,bonusShares,aliveCount,earnedBack,profit,roi,maxFuture,maxShares,maxProfit,total:my.length,
      scoringAlive:my.filter(x=>pts(x.t)>0&&isAlive(x.t)).sort((a,b)=>b.c-a.c),
      scoringElim: my.filter(x=>pts(x.t)>0&&!isAlive(x.t)).sort((a,b)=>b.c-a.c),
      stillAlive:  my.filter(x=>isAlive(x.t)&&pts(x.t)===0).sort((a,b)=>b.c-a.c),
      elim:        my.filter(x=>!isAlive(x.t)&&pts(x.t)===0).sort((a,b)=>b.c-a.c)
    };
  }).sort((a,b)=>b.profit-a.profit);
}

      h+=`<div class="dsec"><div class="dsec-title">Still alive — no wins yet <span>${p.stillAlive.length}</span></div><div class="tlist">`;
      p.stillAlive.forEach(x=>{h+=`<div class="trow al"><span class="tn">${tlogo(x.t)}${x.t}</span><span class="tv">$${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.scoringElim.length){
      h+=`<div class="dsec"><div class="dsec-title">Eliminated · had points <span>${p.scoringElim.length}</span></div><div class="tlist">`;
      p.scoringElim.forEach(x=>{const s=pts(x.t),rl=rlabel(x.t);h+=`<div class="trow sc el"><span class="tn">${tlogo(x.t)}${x.t}${rl?`<span class="rpill">${rl}</span>`:''}</span><span class="tv">+${s} pts · $${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.elim.length){
      h+=`<div class="dsec"><div class="dsec-title">Eliminated <span>${p.elim.length}</span></div><div class="tlist">`;
      p.elim.forEach(x=>{h+=`<div class="trow el"><span class="tn">${tlogo(x.t)}${x.t}</span><span class="tv">$${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    h+=`</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="slabel">Bonus Awards</div><div class="sblock">
    <div class="sblock-head">1 share each · awarded at tournament end</div>
    <div class="brow"><div><div class="btitle">Biggest blowout victim</div><div class="bwin w-like">Sanjay ✓</div></div></div>
    <div class="brow"><div><div class="btitle">Biggest upset</div><div class="bwin w-like">Jack (NC State/Texas · Iowa) ✓</div></div></div>
    <div class="brow"><div><div class="btitle">Lowest seed in Final Four</div><div class="bwin w-like">Lee — Illinois (1-seed) ✓</div></div></div>
  </div>`;

  // ── Final Four Schedule ──
  h+=`<div class="slabel">Final Four · San Antonio</div><div class="sblock">`;
  F4_GAMES.forEach(g=>{
    if(g.done){
      const aWin=g.as>g.bs;
      h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners} · ${g.region}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
    } else {
      h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners} · ${g.region}</div></div><div class="gtime">${g.time}</div></div>`;
    }
  });
  h+=`</div>`;

  // ── Elite Eight Results — all complete ──
  const e8Done=E8_GAMES.filter(g=>g.done);
  const e8Pending=E8_GAMES.filter(g=>!g.done);
  if(e8Done.length){
    h+=`<div class="slabel">Elite Eight Results</div><div class="sblock">`;
    e8Done.forEach(g=>{
      const aWin=g.as>g.bs;
      h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners} · ${g.region}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
    });
    h+=`</div>`;
  }
  if(e8Pending.length){
    h+=`<div class="slabel">Elite Eight Schedule</div><div class="sblock">`;
    e8Pending.forEach(g=>{
      h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners} · ${g.region}</div></div><div class="gtime">${g.time}</div></div>`;
    });
    h+=`</div>`;
  }

  // ── Sweet 16 — only show completed games ──
  const s16Done=S16_GAMES.filter(g=>g.done);
  if(s16Done.length){
    h+=`<div class="slabel">Sweet 16 Results</div><div class="sblock">`;
    s16Done.forEach(g=>{
      const aWin=g.as>g.bs;
      h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners} · ${g.region}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="slabel">R32 Results · Sun Mar 23</div><div class="sblock">`;
  SUN_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="slabel">R32 Results · Sat Mar 22</div><div class="sblock">`;
  SAT_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="footer-note">Scoring: 1pt R64 · 2pt R32 · 4pt S16 · 8pt E8 · 16pt F4 · 24pt Championship · 1pt each bonus. P&L based on current shares projected to pool ($${fmt(TOTAL_SPEND)}). Final Four: UConn vs Illinois · Arizona vs Michigan · Sat Apr 5 · San Antonio. Championship Mon Apr 7.</div>`;

  document.getElementById('root').innerHTML=h;
}

function tog(n){expanded[n]=!expanded[n];render();}

function toggleStandingsMode(){
  const table = document.getElementById('standings-table');
  if(table) table.classList.add('toggling');
  setTimeout(()=>{
    standingsMode = standingsMode === 'dollars' ? 'shares' : 'dollars';
    render();
  }, 180);
}

renderScoreboard();
render();
fetchLiveScores();

// Wire up refresh button
document.getElementById('refresh-btn').addEventListener('click', function(){
  const el = document.getElementById('status-text');
  if(el) el.textContent = 'Refreshing…';
  fetchLiveScores();
});
</script>
</body>
</html>
