<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f2f2f0;
  --surface3: #e8e8e5;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --jack: #0066cc;
  --lee: #007a47;
  --sanjay: #cc3300;
  --Nathan: #7744cc;
  --green: #007a47;
  --red: #cc2200;

  --silver: #888;

  --radius: 10px;
  --radius-sm: 7px;

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; min-height: 100vh; }
.page { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

.header { background: #cc0000; padding: 12px 14px 10px; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.subtitle { font-size: 10px; color: rgba(255,255,255,.75); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #7aff7a; flex-shrink: 0; animation: pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.2} }
.hbtn { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: #fff; cursor: pointer; font-family: 'Outfit', sans-serif; white-space: nowrap; }
.hbtn:active { opacity: .7; }

.scoreboard { background: #111; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; padding: 0 4px; scrollbar-width: none; }
.scoreboard::-webkit-scrollbar { display: none; }
.score-item { display: inline-flex; flex-direction: column; padding: 6px 10px; border-right: 1px solid #333; vertical-align: top; min-width: 110px; }
.score-item:last-child { border-right: none; }
.score-label { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #888; margin-bottom: 3px; }
.score-teams { display: flex; flex-direction: column; gap: 2px; }
.score-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.score-team { font-size: 12px; font-weight: 500; color: #ccc; }
.score-team.winner { font-weight: 700; color: #fff; }
.score-pts { font-size: 12px; font-weight: 700; color: #ccc; min-width: 20px; text-align: right; }

.score-upcoming { font-size: 10px; color: #aaa; padding: 8px 0 4px; }
.score-owner { font-size: 9px; color: #666; margin-top: 2px; }

.body { padding: 12px 10px 0; }

.slabel { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; padding-left: 2px; display: flex; align-items: center; gap: 6px; }
.slabel::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.lb-strips { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.lbs { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.lbs-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.lbs-name { font-size: 11px; font-weight: 600; color: var(--text); }
.lbs-sub { font-size: 10px; color: var(--text3); }
.lbs-rows { padding: 2px 0; }
.lbr { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
.lbr-rank { font-size: 12px; font-weight: 700; min-width: 16px; text-align: center; }
.lbr-rank.r1{color:var(--gold)}.lbr-rank.r2{color:var(--silver)}.lbr-rank.r3{color:var(--bronze)}.lbr-rank.r4{color:var(--text3)}
.lbr-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.lbr-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.lbr-track { width: 75px; height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.lbr-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.lbr-val { font-size: 12px; font-weight: 600; min-width: 56px; text-align: right; }
.lbr-val.pos{color:var(--green)}.lbr-val.neg{color:var(--red)}.lbr-val.neu{color:var(--text2)}

.metrics { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 14px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.metric-lbl { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
.metric-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -.01em; }
.metric-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

.cards { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-hdr { padding: 12px 13px; cursor: pointer; user-select: none; }
.card-hdr:active { background: var(--surface2); }

.card-toprow { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
.av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.cinfo { flex: 1; min-width: 0; }
.cname { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
.csub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.cright { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.pts-big { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -.02em; }
.pts-lbl { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); }
.roi-chip { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.chip-pos{background:#e8f5ee;color:var(--green)}
.chip-neg{background:#fdecea;color:var(--red)}
.chip-neu{background:var(--surface2);color:var(--text2)}

.fin { margin-bottom: 10px; }
.fin-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.fin-lbl { font-size: 10px; font-weight: 600; color: var(--text3); min-width: 46px; letter-spacing: .02em; }
.fin-track { flex: 1; height: 7px; background: var(--surface3); border-radius: 4px; overflow: hidden; }

.fin-val { font-size: 11px; font-weight: 600; min-width: 40px; text-align: right; color: var(--text2); }
.pnl-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: 6px; padding: 6px 10px; margin-top: 3px; }

.sbar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.tog-hint { text-align: center; font-size: 10px; color: var(--text3); }

.dsec { margin-bottom: 9px; }
.dsec:last-child { margin-bottom: 0; }
.dsec-title { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; display: flex; justify-content: space-between; }
.tlist { display: flex; flex-direction: column; gap: 3px; }
.trow { display: flex; justify-content: space-between; align-items: center; padding: 5px 9px; border-radius: 6px; font-size: 12px; }

function espnRoundToKey(h) {
  if (!h) return null;
  const r = h.toLowerCase();
  if (r.includes('first four') || r.includes('first round')) return 'r64';
  if (r.includes('2nd round') || r.includes('second round')) return 'r32';
  if (r.includes('sweet 16') || r.includes('regional semifinal')) return 's16';
  if (r.includes('elite eight') || r.includes('regional final')) return 'e8';
  if (r.includes('final four') || r.includes('national semifinal')) return 'f4';
  if (r.includes('national championship')) return 'champ';
  return null;
}

let liveScores = {}; // keyed by game title from SUN_GAMES

async function fetchLiveScores() {
  try {
    const resp = await fetch(WORKER_URL, {cache:'no-store'});
    if (!resp.ok) return;
    const data = await resp.json();
    const events = data.events || [];

    for (const event of events) {
      const comp = event.competitions?.[0];
      if (!comp) continue;
      const headline = comp.notes?.[0]?.headline || '';
      const roundKey = espnRoundToKey(headline);
      if (!roundKey) continue;

      const statusType = comp.status?.type?.name;
      const isLive = statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_HALFTIME';
      const isFinal = statusType === 'STATUS_FINAL';
      if (!isLive && !isFinal) continue;

      const competitors = comp.competitors || [];
      if (competitors.length !== 2) continue;
      // Always put home team first (top/left), away team second (bottom/right)
      const cHome = competitors.find(c=>c.homeAway==='home') || competitors[0];
      const cAway = competitors.find(c=>c.homeAway==='away') || competitors[1];
      const c0 = cHome, c1 = cAway;
      const d0 = c0.team?.displayName || '', d1 = c1.team?.displayName || '';
      const s0 = parseInt(c0.score)||0, s1 = parseInt(c1.score)||0;
      const n0 = SHORT[d0] || d0.split(' ').pop();
      const n1 = SHORT[d1] || d1.split(' ').pop();
      const clock = comp.status?.displayClock || '';
      const half = comp.status?.period || 1;
      const clockStr = isFinal ? 'Final' :
        statusType==='STATUS_HALFTIME' ? 'Half' :
        `${half>1?'2nd':'1st'} · ${clock}`;

      // Match to SUN_GAMES first, then S16_GAMES
      let match = SUN_GAMES.find(g => {
        if (g.done) return false;
        const gt = g.t.toLowerCase();
        return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
               (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
      });
      let isS16Game = false;
      if (!match && roundKey === 's16') {
        match = S16_GAMES.find(g => {
          if (g.done) return false;  // skip already-finalized S16 games
          const gt = g.t.toLowerCase();
          return (gt.includes(n0.toLowerCase()) || d0.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w))) &&
                 (gt.includes(n1.toLowerCase()) || d1.toLowerCase().split(' ').some(w=>w.length>4&&gt.includes(w)));
        });
        isS16Game = !!match;
      }
      const scoreKey = isS16Game ? 's16:'+match?.t : match?.t;

      if (match) {
        liveScores[scoreKey] = {a:n0,as:s0,b:n1,bs:s1,status:isFinal?'final':'live',clock:clockStr};
      }

      // Update RESULTS for completed games — derive round from tournament date
      if (isFinal) {
        if (match && isS16Game) {
          // S16 game completed
          const winner0 = (c0.winner === true) || (c0.winner === undefined && s0 > s1);
          const winner1 = (c1.winner === true) || (c1.winner === undefined && s1 > s0);
          for (const [c, isWinner] of [[c0, winner0],[c1, winner1]]) {
            const ourName = ESPN_MAP[c.team?.displayName];
            if (!ourName || !RESULTS[ourName]) continue;
            if (isWinner) {
              RESULTS[ourName].s16 = 1;
              RESULTS[ourName].alive = 1;
            } else {
              RESULTS[ourName].s16 = 0;
              RESULTS[ourName].alive = 0;
            }
          }
          if (!match.done) {
            match.done = true;
            match.a = n0; match.as = s0;
            match.b = n1; match.bs = s1;
          }
        } else if (match) {
          // R32 game — always r32 key for SUN_GAMES
          const winner0 = (c0.winner === true) || (c0.winner === undefined && s0 > s1);
          const winner1 = (c1.winner === true) || (c1.winner === undefined && s1 > s0);
          for (const [c, isWinner] of [[c0, winner0],[c1, winner1]]) {
            const ourName = ESPN_MAP[c.team?.displayName];
            if (!ourName || !RESULTS[ourName]) continue;
            if (isWinner) {
              RESULTS[ourName].r32 = 1;
              RESULTS[ourName].alive = 1;
            } else {
              if (!RESULTS[ourName].r32) RESULTS[ourName].r32 = 0;
              RESULTS[ourName].alive = 0;
            }
          }
          if (!match.done) {
            match.done = true;
            match.a = n0; match.as = s0;
            match.b = n1; match.bs = s1;
          }
        }
      }
    }

    const liveCount = Object.values(liveScores).filter(s=>s.status==='live').length;
    const el = document.getElementById('status-text');
    if (el) el.textContent = `✓ ESPN live · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${liveCount?` · 🔴 ${liveCount} game${liveCount>1?'s':''} live`:''}`;
    renderScoreboard();
    render();

    // 2 min if live, 5 min otherwise
    setTimeout(fetchLiveScores, liveCount > 0 ? 2*60*1000 : 5*60*1000);
  } catch(e) {
    console.warn('Worker fetch failed:', e.message, e);
    const el = document.getElementById('status-text');
    if(el) el.textContent = 'ESPN fetch failed: ' + e.message + ' — retrying in 5 min';
    setTimeout(fetchLiveScores, 5*60*1000);
  }
}

// ── Max possible future points, deduplicating matchups ──
// Bracket: East vs South, West vs Midwest in F4
// S16 matchups → E8 pairs → F4 pairs → Championship
const BRACKET = {
  s16: [
    // [teamA, teamB, region, side]  — only one can advance
    ['Texas','NC State/Texas'],      // West S16 (Texas owns NC State/Texas slot)
    ['Purdue',null],                 // West S16 other team (no alias needed, same game above)
    // We model per-game as objects below
  ]
};

// S16 games as [teamA, teamB, region, f4side]
// f4side: 'WM' = West/Midwest half, 'ES' = East/South half
const S16_BRACKET = [
  {a:'NC State/Texas', b:'Purdue',    region:'West',    f4:'WM'},
  {a:'Iowa',           b:'Nebraska',  region:'South',   f4:'ES'},
  {a:'Arkansas',       b:'Arizona',   region:'West',    f4:'WM'},
  {a:'Illinois',       b:'Houston',   region:'South',   f4:'ES'},
  {a:"St. John's",     b:'Duke',      region:'East',    f4:'ES'},
  {a:'Alabama',        b:'Michigan',  region:'Midwest', f4:'WM'},
  {a:'Michigan St.',   b:'UConn',     region:'East',    f4:'ES'},
  {a:'Tennessee',      b:'Iowa St.',  region:'Midwest', f4:'WM'},
];

// E8 pairs: winners of same-region S16 games meet
// West: (Texas/Purdue) vs (Arkansas/Arizona)
// South: (Iowa/Nebraska) vs (Illinois/Houston)
// East: (St John's/Duke) vs (Mich St/UConn)
// Midwest: (Alabama/Michigan) vs (Tennessee/Iowa St.)

// F4 pairs by side:
// WM side: West winner vs Midwest winner
// ES side: East winner vs South winner
// Championship: WM winner vs ES winner

function maxFuturePts(playerTeams) {
  // playerTeams: array of team name strings that are still alive for this player
  const owned = new Set(playerTeams);

  // Points available per round for a team still alive at S16
  // s16 win = 4, e8 win = 8, f4 win = 16, champ win = 24
  const FUTURE = {s16:4, e8:8, f4:16, champ:24};

  // For each S16 game, figure out the max points this player can get
  // considering they may own 0, 1, or 2 teams in the game
  let total = 0;

  // Track which regions this player has a team advancing (best case) to E8
  // region -> best team advancing (for E8 dedup)
  const e8ByRegion = {}; // region -> {teams: [], pts: 0}
  const f4BySide = {};   // 'WM'|'ES' -> {teams: [], pts: 0}

  // Step 1: S16 — for each game, pick best outcome
  for (const game of S16_BRACKET) {
    const hasA = owned.has(game.a);
    const hasB = owned.has(game.b);
    if (!hasA && !hasB) continue;

    // S16 win = 4 pts, regardless of which team
    // Both owned: only one can win S16, so count 4 once
    // One owned: count 4 if they win
    const s16pts = 4; // same either way, one winner

    // Best advancing team for this region (for E8 calculation)
    // If both owned, pick either (both give same future pts structure)
    // We'll track all owned alive teams per region for E8
    if (!e8ByRegion[game.region]) e8ByRegion[game.region] = [];
    if (hasA) e8ByRegion[game.region].push({team: game.a, f4: game.f4});
    if (hasB) e8ByRegion[game.region].push({team: game.b, f4: game.f4});

    // S16 points: one team wins regardless, player gets 4 if they own any team in game
    total += s16pts;
    // If both owned: still only +4 (one advances)
    // Already added once above — correct
  }

  // Step 2: E8 — per region, two S16 games produce two survivors
  // Group regions into E8 matchups
  const regionPairs = {
    'West':    'West',
    'East':    'East',
    'South':   'South',
    'Midwest': 'Midwest',
  };
  // E8 matchups: West vs West (the two West S16 winners meet), etc.
  // Find which regions the player has teams in
  const regions = Object.keys(e8ByRegion);

  // For each region, there are 2 S16 games → 2 E8 participants
  // Player may own 0,1,or 2 of those E8 participants
  // We need to know per-region how many distinct S16 games the player has a team in
  const s16GamesByRegion = {};
  for (const game of S16_BRACKET) {
    if (!s16GamesByRegion[game.region]) s16GamesByRegion[game.region] = [];
    const hasA = owned.has(game.a), hasB = owned.has(game.b);
    if (hasA || hasB) s16GamesByRegion[game.region].push(game);
  }

  // E8: within each region, the two S16 winners play each other
  // If player has teams from BOTH S16 games in a region → owns both E8 slots → only 1 can win E8 → +8 once
  // If player has team from ONE S16 game in a region → that team could win E8 → +8
  // If player has team from NEITHER → +0
  const processedRegions = new Set();
  for (const region of ['West','East','South','Midwest']) {
    const games = s16GamesByRegion[region] || [];
    if (games.length === 0) continue;
    // Player has at least one team in this region's S16
    // E8 win = 8 pts, one team wins regardless of how many the player owns in region
    total += 8;

    // Track for F4: player gets a team to F4 from this region (best case)
    const f4side = games[0].f4;
    if (!f4BySide[f4side]) f4BySide[f4side] = 0;
    f4BySide[f4side]++;
  }

  // Step 3: F4 — two regions per side, one F4 game per side
  // WM side: West winner vs Midwest winner
  // ES side: East winner vs South winner
  // If player has teams in BOTH regions on same side → owns both F4 slots → only 1 wins → +16 once
  // If player has team in ONE region on a side → +16
  for (const side of ['WM', 'ES']) {
    const count = f4BySide[side] || 0;
    if (count === 0) continue;
    total += 16; // one F4 win regardless of how many owned on this side
  }

  // Step 4: Championship
  // If player has teams on BOTH sides → only one can win champ → +24 once
  // If player has team on ONE side → +24
  const hasBothSides = (f4BySide['WM']||0) > 0 && (f4BySide['ES']||0) > 0;
  const hasAnySide = (f4BySide['WM']||0) > 0 || (f4BySide['ES']||0) > 0;
  if (hasAnySide) total += 24;

  return total;
}

function buildLB(){
  return['Jack','Lee','Sanjay','Nathan'].map(name=>{
    const my=TEAMS.filter(x=>x.o===name);
    const spend=my.reduce((s,x)=>s+x.c,0);
    const shares=my.reduce((s,x)=>s+pts(x.t),0);
    const aliveCount=my.filter(x=>isAlive(x.t)).length;
    const earnedBack=(shares/TOTAL_SHARES)*TOTAL_SPEND;
    const profit=earnedBack-spend;
    const roi=(profit/spend)*100;
    const aliveTeams=my.filter(x=>isAlive(x.t)).map(x=>x.t);
    const maxFuture=maxFuturePts(aliveTeams);
    const maxShares=shares+maxFuture;
    const maxEarned=(maxShares/TOTAL_SHARES)*TOTAL_SPEND;
    const maxProfit=maxEarned-spend;
    return{name,spend,shares,aliveCount,earnedBack,profit,roi,maxFuture,maxShares,maxProfit,total:my.length,
      scoringAlive:my.filter(x=>pts(x.t)>0&&isAlive(x.t)).sort((a,b)=>b.c-a.c),
      scoringElim: my.filter(x=>pts(x.t)>0&&!isAlive(x.t)).sort((a,b)=>b.c-a.c),
      stillAlive:  my.filter(x=>isAlive(x.t)&&pts(x.t)===0).sort((a,b)=>b.c-a.c),
      elim:        my.filter(x=>!isAlive(x.t)&&pts(x.t)===0).sort((a,b)=>b.c-a.c)
    };
  }).sort((a,b)=>b.profit-a.profit);
}

    function s16scores(g, live) {
      const parts = g.t.split(' vs ');
      const t1 = parts[0].toLowerCase(), t2 = (parts[1]||'').toLowerCase();
      const aIsFirst = live.a.toLowerCase().split(' ').some(w=>t1.includes(w)&&w.length>2) ||
                       t1.includes(live.a.toLowerCase());
      if(aIsFirst) return {t1:live.a,s1:live.as,t2:live.b,s2:live.bs};
      return {t1:live.b,s1:live.bs,t2:live.a,s2:live.as};
    }
    if(live&&live.status==='live'){
      const {t1,s1,t2,s2}=s16scores(g,live);
      h+=`<div class="score-item"><div class="score-label" style="color:#ff4444">🔴 S16 · ${live.clock}</div><div class="score-teams"><div class="score-row"><span class="score-team">${t1}</span><span class="score-pts">${s1}</span></div><div class="score-row"><span class="score-team">${t2}</span><span class="score-pts">${s2}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else if(g.done){
      const aWin=g.as>g.bs;
      h+=`<div class="score-item"><div class="score-label" style="color:#b8860b">✓ Final · S16</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${g.a}</span><span class="score-pts${aWin?' winner':''}">${g.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${g.b}</span><span class="score-pts${!aWin?' winner':''}">${g.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else if(live&&live.status==='final'){
      const {t1,s1,t2,s2}=s16scores(g,live);
      const aWin=s1>s2;
      h+=`<div class="score-item"><div class="score-label" style="color:#b8860b">✓ Final · S16</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${t1}</span><span class="score-pts${aWin?' winner':''}">${s1}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${t2}</span><span class="score-pts${!aWin?' winner':''}">${s2}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else {
      h+=`<div class="score-item"><div class="score-label" style="color:#f0a500">S16 · ${g.time}</div><div class="score-upcoming">${g.t}</div><div class="score-owner">${g.owners}</div></div>`;
    }
  });
  // Separator
  h+=`<div class="score-item" style="opacity:.4;min-width:4px;padding:0;border-right:1px solid #444"></div>`;
  // R32 results (sorted: live > upcoming > final, same as before)
  const sorted=[...SUN_GAMES].sort((a,b)=>{
    const la=liveScores[a.t],lb=liveScores[b.t];
    const aL=la&&la.status==='live', bL=lb&&lb.status==='live';
    const aF=a.done||(la&&la.status==='final'), bF=b.done||(lb&&lb.status==='final');
    if(aL&&!bL)return -1; if(bL&&!aL)return 1;
    if(!aF&&bF)return -1; if(aF&&!bF)return 1;
    return 0;
  });
  sorted.forEach(g=>{
    const live=liveScores[g.t];
    if(live&&live.status==='live'){
      h+=`<div class="score-item"><div class="score-label" style="color:#ff4444">🔴 ${live.clock}</div><div class="score-teams"><div class="score-row"><span class="score-team">${live.a}</span><span class="score-pts">${live.as}</span></div><div class="score-row"><span class="score-team">${live.b}</span><span class="score-pts">${live.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else if(g.done){
      const aWin=g.as>g.bs;
      h+=`<div class="score-item"><div class="score-label">Final · R32</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${g.a}</span><span class="score-pts${aWin?' winner':''}">${g.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${g.b}</span><span class="score-pts${!aWin?' winner':''}">${g.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else if(live&&live.status==='final'){
      const aWin=live.as>live.bs;
      h+=`<div class="score-item"><div class="score-label">Final · R32</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${live.a}</span><span class="score-pts${aWin?' winner':''}">${live.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${live.b}</span><span class="score-pts${!aWin?' winner':''}">${live.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
    } else {
      h+=`<div class="score-item"><div class="score-label">${g.time}</div><div class="score-upcoming">${g.t}</div><div class="score-owner">${g.owners}</div></div>`;
    }
  });
  SAT_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="score-item"><div class="score-label">Final · R32</div><div class="score-teams"><div class="score-row"><span class="score-team${aWin?' winner':''}">${g.a}</span><span class="score-pts${aWin?' winner':''}">${g.as}</span></div><div class="score-row"><span class="score-team${!aWin?' winner':''}">${g.b}</span><span class="score-pts${!aWin?' winner':''}">${g.bs}</span></div></div><div class="score-owner">${g.owners}</div></div>`;
  });
  const el=document.getElementById('scoreboard-strip');
  if(el)el.innerHTML=h;
}

function render(){
  const lb=buildLB();
  const totalShares=lb.reduce((s,p)=>s+p.shares,0);
  const maxShares=Math.max(...lb.map(p=>p.shares),1);
  const aliveTotal=lb.reduce((s,p)=>s+p.aliveCount,0);
  const maxSpend=Math.max(...lb.map(p=>p.spend));

  // Only set fallback status if fetchLiveScores hasn't updated it yet
  const stEl=document.getElementById('status-text');
  if(stEl && stEl.textContent==='Loading…') stEl.textContent='Sweet 16 starts Thu Mar 26 · R32 complete';

  let h='';

  // Sort by current profit
  const lbSorted=[...lb].sort((a,b)=>b.profit-a.profit);
  h+=`<div class="slabel">Standings</div>`;
  h+=`<div class="lbs" style="margin-bottom:14px;overflow-x:auto;">
    <table class="sbtable">
      <thead><tr>
        <th class="left" style="padding-left:12px">RANK</th>
        <th class="left">PLAYER</th>
        <th>LIVE PROFIT</th>
        <th>MAX WIN</th>
        <th>S16</th>
        <th>R32</th>
        <th>R64</th>
      </tr></thead>
      <tbody>`;
  lbSorted.forEach((p,i)=>{
    const c=PC[p.name];
    const INITIALS={Jack:'JO',Lee:'LJ',Sanjay:'SR',Nathan:'NW'};
    const init=INITIALS[p.name]||p.name.slice(0,2).toUpperCase();
    const disp=p.name.charAt(0).toUpperCase()+p.name.slice(1);
    const pnlStr=(p.profit>=0?'+$':'-$')+fmt(Math.abs(p.profit));
    const maxStr=(p.maxProfit>=0?'+$':'-$')+fmt(Math.abs(p.maxProfit));
    const pnlCls=p.profit>0?'sb-pnl-pos':p.profit<0?'sb-pnl-neg':'sb-pnl-neu';
    const rankCls=RK[i];
    // Points by round
    const myTeams=TEAMS.filter(x=>x.o===p.name);
    const s16pts=myTeams.reduce((s,x)=>{const r=RESULTS[x.t]||{};return s+(r.s16||0)*4;},0);
    const r32pts=myTeams.reduce((s,x)=>{const r=RESULTS[x.t]||{};return s+(r.r32||0)*2;},0);
    const r64pts=myTeams.reduce((s,x)=>{const r=RESULTS[x.t]||{};return s+(r.r64||0)*1;},0);
    // Points earned per round (ESPN convention: column = round reached)
    // S16 col = pts from winning R32 games (reaching Sweet 16) = r32*2
    // R32 col = pts from winning R64 games (reaching Round of 32) = r64*1
    // E8 col = pts from winning S16 games (reaching Elite 8) = s16*4
    const e8pts=myTeams.reduce((s,x)=>{const r=RESULTS[x.t]||{};return s+(r.e8||0)*8+(r.s16||0)*4;},0);
    const s16reached=myTeams.reduce((s,x)=>{const r=RESULTS[x.t]||{};return s+(r.r32||0)*2;},0);
    const r32reached=myTeams.reduce((s,x)=>{const r=RESULTS[x.t]||{};return s+(r.r64||0)*1;},0);
    h+=`<tr>
      <td style="padding-left:12px"><span class="sb-rank ${rankCls}">${i+1}</span></td>
      <td class="left"><div class="sb-player"><div class="sb-av" style="background:${c.av};color:${c.avtxt}">${init}</div><div><div class="sb-name">${disp}</div><div class="sb-sub"><span style="font-weight:700;color:var(--green)">${p.aliveCount} alive</span> · $${fmt(p.spend)} spent</div></div></div></td>
      <td><span class="${pnlCls}">${pnlStr}</span></td>
      <td><span class="sb-max">${maxStr}</span></td>
      <td><span class="sb-pts">${s16pts}</span></td>
      <td><span class="sb-pts">${r32pts}</span></td>
      <td><span class="sb-pts">${r64pts}</span></td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="metrics">
    <div class="metric"><div class="metric-lbl">Pool</div><div class="metric-val">$${fmt(TOTAL_SPEND)}</div><div class="metric-sub">total auction spend</div></div>
    <div class="metric"><div class="metric-lbl">Leader</div><div class="metric-val">${lb[0].name.charAt(0).toUpperCase()+lb[0].name.slice(1)}</div><div class="metric-sub">${(lb[0].profit>=0?'+$':'-$')+fmt(Math.abs(lb[0].profit))} P&L</div></div>
    <div class="metric"><div class="metric-lbl">Max Upside</div><div class="metric-val">${(lb[0].maxProfit>=0?'+$':'-$')+fmt(Math.abs(lb[0].maxProfit))}</div><div class="metric-sub">${lb[0].name.charAt(0).toUpperCase()+lb[0].name.slice(1)} · best case P&L</div></div>
    <div class="metric"><div class="metric-lbl">Teams alive</div><div class="metric-val">${fmtInt(aliveTotal)}</div><div class="metric-sub">still in tournament</div></div>
  </div>`;

  h+=`<div class="slabel">Players</div><div class="cards">`;
  lb.forEach((p,i)=>{
    const c=PC[p.name];
    const sharePct=(p.shares/maxShares*100).toFixed(1);
    const roiStr=(p.roi>=0?'+':'')+p.roi.toFixed(0)+'%';
    const roiCls=p.roi>2?'chip-pos':p.roi<-2?'chip-neg':'chip-neu';
    const init=p.name.slice(0,2).toUpperCase();
    const isOpen=expanded[p.name];
    const disp=p.name.charAt(0).toUpperCase()+p.name.slice(1);
    const spendPct=(p.spend/maxSpend*100).toFixed(1);
    const earnedPct=Math.min((p.earnedBack/maxSpend*100),100).toFixed(1);
    const pnlCls=p.profit>0?'pnl-pos':p.profit<0?'pnl-neg':'pnl-neu';
    const pnlStr=(p.profit>=0?'+$':'-$')+fmt(Math.abs(p.profit));
    h+=`<div class="card"><div class="card-hdr" onclick="tog('${p.name}')">
      <div class="card-toprow">
        <div class="av" style="background:${c.av};color:${c.avtxt}">${init}</div>
        <div class="cinfo"><div class="cname">${disp}</div><div class="csub">${p.total} teams · $${fmt(p.spend)} spent · ${p.aliveCount} alive · max ${(p.maxProfit>=0?'+$':'-$')+fmt(Math.abs(p.maxProfit))}</div></div>
        <div class="cright"><div class="pts-big" style="color:${p.profit>=0?'var(--green)':'var(--red)'}">${(p.profit>=0?'+$':'-$')+fmt(Math.abs(p.profit))}</div><div class="pts-lbl">P&L</div><div class="roi-chip ${roiCls}">${roiStr}</div></div>
      </div>
      <div class="fin">
        <div class="fin-row"><div class="fin-lbl">Spent</div><div class="fin-track"><div class="fin-fill" style="width:${spendPct}%;background:#ccc"></div></div><div class="fin-val">$${fmt(p.spend)}</div></div>
        <div class="fin-row"><div class="fin-lbl">Earned</div><div class="fin-track"><div class="fin-fill" style="width:${earnedPct}%;background:${c.c}"></div></div><div class="fin-val" style="color:${c.c}">$${fmt(p.earnedBack)}</div></div>
        <div class="pnl-row"><div class="pnl-lbl">Current P&L</div><div class="pnl-val ${pnlCls}">${pnlStr}</div></div>
      </div>
      <div class="sbar"><div class="sbar-fill" style="width:${sharePct}%;background:${c.c}"></div></div>
      <div class="tog-hint">${isOpen?'▲ hide teams':'▼ show teams'}</div>
    </div>
    <div class="card-detail ${isOpen?'open':''}">`;
    if(p.scoringAlive.length){
      h+=`<div class="dsec"><div class="dsec-title">Scoring · still alive <span>${p.scoringAlive.length}</span></div><div class="tlist">`;
      p.scoringAlive.forEach(x=>{const s=pts(x.t),rl=rlabel(x.t);h+=`<div class="trow sc"><span class="tn">${x.t}${rl?`<span class="rpill">${rl}</span>`:''}</span><span class="tv">+${s} pts · $${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.stillAlive.length){
      h+=`<div class="dsec"><div class="dsec-title">Still alive — no wins yet <span>${p.stillAlive.length}</span></div><div class="tlist">`;
      p.stillAlive.forEach(x=>{h+=`<div class="trow al"><span class="tn">${x.t}</span><span class="tv">$${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.scoringElim.length){
      h+=`<div class="dsec"><div class="dsec-title">Eliminated · had points <span>${p.scoringElim.length}</span></div><div class="tlist">`;
      p.scoringElim.forEach(x=>{const s=pts(x.t),rl=rlabel(x.t);h+=`<div class="trow sc el"><span class="tn">${x.t}${rl?`<span class="rpill">${rl}</span>`:''}</span><span class="tv">+${s} pts · $${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    if(p.elim.length){
      h+=`<div class="dsec"><div class="dsec-title">Eliminated <span>${p.elim.length}</span></div><div class="tlist">`;
      p.elim.forEach(x=>{h+=`<div class="trow el"><span class="tn">${x.t}</span><span class="tv">$${fmt(x.c)}</span></div>`;});
      h+=`</div></div>`;
    }
    h+=`</div></div>`;
  });
  h+=`</div>`;

  const texasAlive=!!(RESULTS['NC State/Texas']||{}).alive;
  h+=`<div class="slabel">Bonus Awards</div><div class="sblock">
    <div class="sblock-head">1 share each · awarded at tournament end</div>
    <div class="brow"><div class="bicon">💥</div><div><div class="btitle">Biggest blowout victim</div><div class="bdesc">Current leader: Lehigh/Prairie View lost to Florida by 59 pts — 2nd largest margin in NCAA history.</div><div class="bwin w-like">⟳ Currently Sanjay · not yet confirmed</div></div></div>
    <div class="brow"><div class="bicon">🏆</div><div><div class="btitle">Biggest upset</div><div class="bdesc">Current leader: Texas (#11) over Gonzaga (#3) — 8-seed differential.</div><div class="bwin w-like">⟳ Currently Jack (owns NC State/Texas) · not yet confirmed</div></div></div>
    <div class="brow"><div class="bicon">🌀</div><div><div class="btitle">Lowest seed in Final Four</div><div class="bdesc">Texas (11-seed) is the only double-digit seed still alive.</div><div class="bwin ${texasAlive?'w-like':'w-tbd'}">${texasAlive?'⟳ Watch Texas — Jack could win this if Texas reaches Final Four':'TBD'}</div></div></div>
  </div>`;

  // ── Sweet 16 Schedule — only show completed games ──
  const s16Done=S16_GAMES.filter(g=>g.done);
  if(s16Done.length){
    h+=`<div class="slabel">Sweet 16 Results</div><div class="sblock">`;
    s16Done.forEach(g=>{
      const aWin=g.as>g.bs;
      h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners} · ${g.region}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)} ✓</div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="slabel">R32 Results · Sun Mar 23</div><div class="sblock">`;
  SUN_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="slabel">R32 Results · Sat Mar 22</div><div class="sblock">`;
  SAT_GAMES.forEach(g=>{
    const aWin=g.as>g.bs;
    h+=`<div class="grow"><div><div class="gteams">${g.t}</div><div class="gowners">${g.owners}</div></div><div class="gscore">${aWin?g.a:g.b} ${Math.max(g.as,g.bs)}–${Math.min(g.as,g.bs)}</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="footer-note">Scoring: 1pt R64 · 2pt R32 · 4pt S16 · 8pt E8 · 16pt F4 · 24pt Championship · 1pt each bonus. P&L based on current shares projected to pool ($${fmt(TOTAL_SPEND)}). Sweet 16 starts Thu Mar 26 — scores update live via ESPN. Send updated file to lock in S16 results.</div>`;

  document.getElementById('root').innerHTML=h;
}

function tog(n){expanded[n]=!expanded[n];render();}

renderScoreboard();
render();
fetchLiveScores();

// Wire up refresh button
document.getElementById('refresh-btn').addEventListener('click', function(){
  const el = document.getElementById('status-text');
  if(el) el.textContent = 'Refreshing…';
  fetchLiveScores();
});
</script>
</body>
</html>
